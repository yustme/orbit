<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>3D Solar System</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: sans-serif;
            pointer-events: none;
            z-index: 10;
        }
        #info h1 { font-size: 1.1em; margin: 0 0 4px; letter-spacing: 2px; text-transform: uppercase; }
        #info p { font-size: 0.75em; margin: 0; opacity: 0.5; }
        #legend {
            position: absolute;
            bottom: 24px;
            right: 20px;
            color: #fff;
            font-family: sans-serif;
            font-size: 0.75em;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.85;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .legend-section {
            font-size: 0.75em;
            letter-spacing: 2px;
            opacity: 0.4;
            text-transform: uppercase;
            margin-top: 8px;
            margin-bottom: 2px;
        }
        .legend-galaxy {
            pointer-events: all;
            cursor: pointer;
            opacity: 0.75;
            transition: opacity 0.15s;
        }
        .legend-galaxy:hover {
            opacity: 1;
            color: #aaddff;
        }
        .legend-galaxy-icon {
            width: 12px;
            height: 7px;
            border-radius: 50%;
            border: 1px solid rgba(180,210,255,0.7);
            transform: rotate(-20deg);
            flex-shrink: 0;
        }
        #galaxy-info {
            position: absolute;
            bottom: 24px;
            left: 20px;
            color: #fff;
            font-family: sans-serif;
            font-size: 0.8em;
            background: rgba(0,0,0,0.75);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            padding: 16px 20px;
            max-width: 320px;
            display: none;
            z-index: 10;
            pointer-events: none;
        }
        .ginfo-name {
            font-size: 1.15em;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: #aaddff;
            text-transform: uppercase;
        }
        .ginfo-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 5px;
            opacity: 0.85;
        }
        .ginfo-row span { opacity: 0.45; flex-shrink: 0; }
        .ginfo-fact {
            margin-top: 10px;
            font-style: italic;
            opacity: 0.6;
            font-size: 0.88em;
            line-height: 1.55;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 8px;
        }
        #back-btn {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            background: rgba(0,0,0,0.7);
            color: #aaddff;
            border: 1px solid rgba(100,180,255,0.3);
            border-radius: 4px;
            padding: 8px 22px;
            font-family: sans-serif;
            font-size: 0.78em;
            letter-spacing: 2px;
            cursor: pointer;
            z-index: 20;
        }
        #back-btn:hover { background: rgba(20,50,90,0.85); border-color: rgba(100,180,255,0.6); }
        #tooltip {
            position: absolute;
            pointer-events: none;
            z-index: 100;
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 5px 12px;
            border-radius: 4px;
            font-family: sans-serif;
            font-size: 0.78em;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.18);
            display: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>3D Solar System</h1>
        <p>LMB: Rotate &nbsp;|&nbsp; Scroll: Zoom &nbsp;|&nbsp; RMB: Pan</p>
    </div>

    <div id="tooltip"></div>
    <div id="galaxy-info"></div>
    <button id="back-btn">&#8592; Back to Solar System</button>

    <div id="legend">
        <div class="legend-section">Planets</div>
        <div class="legend-item"><div class="legend-dot" style="background:#887766"></div>Mercury</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ddaa55"></div>Venus</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4488ff"></div>Earth</div>
        <div class="legend-item"><div class="legend-dot" style="background:#cc5533"></div>Mars</div>
        <div class="legend-item"><div class="legend-dot" style="background:#cc9944"></div>Jupiter</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ddcc88"></div>Saturn</div>
        <div class="legend-item"><div class="legend-dot" style="background:#55ccdd"></div>Uranus</div>
        <div class="legend-item"><div class="legend-dot" style="background:#3366cc"></div>Neptune</div>
        <div class="legend-section">Galaxies</div>
        <div id="galaxy-legend"></div>
    </div>

    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // Scene
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(0, 55, 110);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.9;
        document.body.appendChild(renderer.domElement);

        // Post-processing: bloom
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.5, 0.3, 0.92
        );
        composer.addPass(bloomPass);
        composer.addPass(new OutputPass());

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.zoomSpeed = 2.5;
        controls.minDistance = 4;
        controls.maxDistance = 400;

        // Three.js r155+ uses physical light units by default - legacy mode needed
        renderer.useLegacyLights = true;

        // Lighting - ambient gives dark sides a faint blue glow, sun has linear falloff
        scene.add(new THREE.AmbientLight(0x2244aa, 0.7));
        const sunLight = new THREE.PointLight(0xfff5e0, 2.2, 250, 1);
        scene.add(sunLight);

        const textureLoader = new THREE.TextureLoader();

        function canvasTex(fn, size = 512) {
            const c = document.createElement('canvas');
            c.width = c.height = size;
            fn(c.getContext('2d'), size);
            return new THREE.CanvasTexture(c);
        }

        // Sun texture
        const sunTex = canvasTex((ctx, s) => {
            const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
            g.addColorStop(0,   '#fffde0');
            g.addColorStop(0.2, '#ffe066');
            g.addColorStop(0.5, '#ff9900');
            g.addColorStop(0.8, '#e05000');
            g.addColorStop(1,   '#992200');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, s, s);
            for (let i = 0; i < 300; i++) {
                const x = Math.random() * s, y = Math.random() * s;
                const r = Math.random() * 25 + 5;
                ctx.fillStyle = `rgba(255,240,100,${Math.random() * 0.25})`;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }
        }, 1024);

        const sun = new THREE.Mesh(
            new THREE.SphereGeometry(5, 64, 64),
            new THREE.MeshBasicMaterial({ map: sunTex })
        );
        scene.add(sun);

        // Sun glow sprite
        const glowTex = canvasTex((ctx, s) => {
            const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
            g.addColorStop(0,    'rgba(255,220,80,0.5)');
            g.addColorStop(0.3,  'rgba(255,140,20,0.2)');
            g.addColorStop(0.7,  'rgba(255,80,0,0.05)');
            g.addColorStop(1,    'rgba(0,0,0,0)');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, s, s);
        }, 512);
        const glow = new THREE.Sprite(new THREE.SpriteMaterial({
            map: glowTex, blending: THREE.AdditiveBlending,
            transparent: true, depthWrite: false
        }));
        glow.scale.set(18, 18, 1);
        scene.add(glow);

        // ── Milky Way panorama skybox ─────────────────────────────────────────
        // Real ESO photo of the full Milky Way (equirectangular projection)
        const skyTex = textureLoader.load('textures/milky_way.jpg');
        skyTex.colorSpace = THREE.SRGBColorSpace;
        scene.add(new THREE.Mesh(
            new THREE.SphereGeometry(4000, 64, 32),
            new THREE.MeshBasicMaterial({ map: skyTex, side: THREE.BackSide })
        ));

        // ── Bright stars — real Hipparcos catalog (RA h, Dec °, Vmag, B-V) ────
        // Converted to 3D: x=r·cos(dec)·cos(ra), y=r·sin(dec), z=r·cos(dec)·sin(ra)
        // [RA_h, Dec_deg, Vmag, B-V, name]
        const catalog = [
            [6.753,-16.716,-1.46, 0.00,'Sirius (α CMa)'],
            [6.399,-52.696,-0.74, 0.15,'Canopus (α Car)'],
            [14.660,-60.835,-0.27, 0.71,'Rigil Kentaurus (α Cen)'],
            [14.261, 19.182,-0.05, 1.23,'Arcturus (α Boo)'],
            [18.616, 38.783, 0.03, 0.00,'Vega (α Lyr)'],
            [5.278,  45.998, 0.08, 0.80,'Capella (α Aur)'],
            [5.242,  -8.202, 0.13,-0.03,'Rigel (β Ori)'],
            [7.655,   5.225, 0.34, 0.42,'Procyon (α CMi)'],
            [1.628, -57.237, 0.45,-0.16,'Achernar (α Eri)'],
            [5.919,   7.407, 0.50, 1.85,'Betelgeuse (α Ori)'],
            [14.064,-60.374, 0.61,-0.23,'Hadar (β Cen)'],
            [19.846,  8.868, 0.76, 0.22,'Altair (α Aql)'],
            [12.443,-63.099, 0.76,-0.24,'Acrux (α Cru)'],
            [4.599,  16.509, 0.87, 1.54,'Aldebaran (α Tau)'],
            [16.490,-26.432, 0.96, 1.83,'Antares (α Sco)'],
            [13.420,-11.161, 1.04,-0.24,'Spica (α Vir)'],
            [7.755,  28.026, 1.14, 1.00,'Pollux (β Gem)'],
            [22.961,-29.622, 1.16, 0.09,'Fomalhaut (α PsA)'],
            [20.691, 45.280, 1.25, 0.09,'Deneb (α Cyg)'],
            [10.139, 11.967, 1.35,-0.11,'Regulus (α Leo)'],
            [6.977, -28.972, 1.50,-0.21,'Adhara (ε CMa)'],
            [7.577,  31.888, 1.58, 0.03,'Castor (α Gem)'],
            [17.560,-37.103, 1.63,-0.22,'Shaula (λ Sco)'],
            [5.419,   6.349, 1.64,-0.22,'Bellatrix (γ Ori)'],
            [5.438,  28.608, 1.65,-0.13,'Elnath (β Tau)'],
            [5.605,  -1.202, 1.70,-0.19,'Alnilam (ε Ori)'],
            [2.530,  89.264, 1.97, 0.60,'Polaris (α UMi)'],
            [3.405,  49.861, 1.79, 0.48,'Mirfak (α Per)'],
            [11.062, 61.751, 1.79, 1.07,'Dubhe (α UMa)'],
            [12.900, 55.960, 1.77,-0.02,'Alioth (ε UMa)'],
            [13.792, 49.313, 1.86,-0.19,'Alkaid (η UMa)'],
            [18.402,-34.384, 1.85, 0.42,'Kaus Australis (ε Sgr)'],
            [16.811,-69.028, 1.92, 1.44,'Atria (α TrA)'],
            [20.427,-56.735, 1.94,-0.19,'Peacock (α Pav)'],
            [22.137,-46.961, 1.74,-0.13,'Al Nair (α Gru)'],
            [9.460,  -8.658, 1.99, 1.44,'Alphard (α Hya)'],
            [11.818, 14.572, 2.14, 0.48,'Denebola (β Leo)'],
            [6.063,  20.212, 2.00,-0.20,'Alhena (γ Gem)'],
            [17.943, 51.489, 2.23, 0.00,'Eltanin (γ Dra)'],
            [19.512, 27.960, 2.72, 0.40,'Albireo (β Cyg)'],
            [0.944, -57.837, 2.24, 0.27,'Ankaa (α Phe)'],
            [2.295,  57.815, 2.27, 0.48,'Schedar (α Cas)'],
            [12.519,-57.114, 1.63, 1.60,'Gacrux (γ Cru)'],
            [8.158, -47.337, 1.78,-0.22,'Regor (γ Vel)'],
        ];

        function bvToRGB(bv) {
            if (bv < -0.3) return [0.55, 0.65, 1.00];
            if (bv <  0.0) return [0.70, 0.82, 1.00];
            if (bv <  0.3) return [0.95, 0.95, 1.00];
            if (bv <  0.6) return [1.00, 0.97, 0.85];
            if (bv <  1.0) return [1.00, 0.88, 0.60];
            if (bv <  1.5) return [1.00, 0.68, 0.30];
            return [1.00, 0.40, 0.15];
        }

        const R = 3800;
        const catPos = new Float32Array(catalog.length * 3);
        const catCol = new Float32Array(catalog.length * 3);
        const starNames = [];
        for (let i = 0; i < catalog.length; i++) {
            const [ra_h, dec_d, vmag, bv, name] = catalog[i];
            const ra  = ra_h * 15 * Math.PI / 180;
            const dec = dec_d * Math.PI / 180;
            catPos[i*3]   = R * Math.cos(dec) * Math.cos(ra);
            catPos[i*3+1] = R * Math.sin(dec);
            catPos[i*3+2] = R * Math.cos(dec) * Math.sin(ra);
            const [r, g, b] = bvToRGB(bv);
            catCol[i*3] = r; catCol[i*3+1] = g; catCol[i*3+2] = b;
            starNames.push(name);
        }
        const catGeo = new THREE.BufferGeometry();
        catGeo.setAttribute('position', new THREE.BufferAttribute(catPos, 3));
        catGeo.setAttribute('color',    new THREE.BufferAttribute(catCol, 3));
        const starPoints = new THREE.Points(catGeo, new THREE.PointsMaterial({
            size: 3, vertexColors: true, sizeAttenuation: false,
            transparent: true, opacity: 0.95
        }));
        scene.add(starPoints);

        // ── Known galaxies ────────────────────────────────────────────────────
        // Sprites at real RA/Dec positions on the skybox sphere

        function galaxyTex(type, tilt) {
            return canvasTex((ctx, s) => {
                ctx.translate(s / 2, s / 2);
                ctx.rotate(tilt || 0);
                if (type === 'spiral') {
                    // Disk
                    const disk = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 0.45);
                    disk.addColorStop(0,   'rgba(255,245,210,0.85)');
                    disk.addColorStop(0.2, 'rgba(230,200,150,0.35)');
                    disk.addColorStop(1,   'rgba(0,0,0,0)');
                    ctx.fillStyle = disk;
                    ctx.beginPath(); ctx.ellipse(0, 0, s*0.45, s*0.22, 0, 0, Math.PI*2); ctx.fill();
                    // Two spiral arms
                    for (let arm = 0; arm < 2; arm++) {
                        ctx.beginPath();
                        ctx.strokeStyle = 'rgba(220,200,160,0.4)';
                        ctx.lineWidth = s * 0.05;
                        ctx.lineCap = 'round';
                        for (let t = 0; t <= 1; t += 0.02) {
                            const a = arm * Math.PI + t * Math.PI * 1.3;
                            const r = t * s * 0.43;
                            const x = Math.cos(a) * r, y = Math.sin(a) * r * 0.45;
                            t === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                        }
                        ctx.stroke();
                    }
                    // Bright core
                    const core = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 0.1);
                    core.addColorStop(0, 'rgba(255,250,230,0.95)');
                    core.addColorStop(1, 'rgba(255,220,150,0)');
                    ctx.fillStyle = core;
                    ctx.beginPath(); ctx.arc(0, 0, s * 0.1, 0, Math.PI * 2); ctx.fill();
                } else if (type === 'elliptical') {
                    const g = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 0.42);
                    g.addColorStop(0,   'rgba(255,240,200,0.9)');
                    g.addColorStop(0.35,'rgba(230,200,150,0.4)');
                    g.addColorStop(1,   'rgba(0,0,0,0)');
                    ctx.fillStyle = g;
                    ctx.beginPath(); ctx.ellipse(0, 0, s*0.42, s*0.3, 0, 0, Math.PI*2); ctx.fill();
                } else { // irregular (Magellanic Clouds)
                    const g = ctx.createRadialGradient(0, -s*0.05, 0, 0, 0, s * 0.46);
                    g.addColorStop(0,   'rgba(210,225,255,0.85)');
                    g.addColorStop(0.5, 'rgba(180,200,245,0.35)');
                    g.addColorStop(1,   'rgba(0,0,0,0)');
                    ctx.fillStyle = g;
                    ctx.beginPath(); ctx.ellipse(0, 0, s*0.46, s*0.38, 0.4, 0, Math.PI*2); ctx.fill();
                    // Star-forming knots
                    for (let k = 0; k < 4; k++) {
                        const kx = (Math.random()-0.5)*s*0.28, ky = (Math.random()-0.5)*s*0.28;
                        const kg = ctx.createRadialGradient(kx, ky, 0, kx, ky, s*0.07);
                        kg.addColorStop(0, 'rgba(200,215,255,0.45)');
                        kg.addColorStop(1, 'rgba(0,0,0,0)');
                        ctx.fillStyle = kg;
                        ctx.beginPath(); ctx.arc(kx, ky, s*0.07, 0, Math.PI*2); ctx.fill();
                    }
                }
            }, 256);
        }

        const galaxyData = [
            { name: 'Andromeda (M31)',  ra_h: 0.712,  dec:  41.27,  type: 'spiral',    tilt:  0.5, scale: 24, opacity: 1.0 },
            { name: 'Triangulum (M33)', ra_h: 1.564,  dec:  30.66,  type: 'spiral',    tilt:  1.2, scale: 11, opacity: 0.65 },
            { name: 'LMC',              ra_h: 5.392,  dec: -69.75,  type: 'irregular', tilt:  0.3, scale: 30, opacity: 0.9 },
            { name: 'SMC',              ra_h: 0.878,  dec: -72.80,  type: 'irregular', tilt: -0.5, scale: 19, opacity: 0.8 },
            { name: "Bode's (M81)",     ra_h: 9.926,  dec:  69.07,  type: 'spiral',    tilt:  0.8, scale: 10, opacity: 0.6 },
            { name: 'Centaurus A',      ra_h: 13.426, dec: -43.02,  type: 'elliptical',tilt:  0.4, scale: 10, opacity: 0.6 },
            { name: 'Sombrero (M104)',  ra_h: 12.666, dec: -11.62,  type: 'spiral',    tilt:  0.1, scale:  8, opacity: 0.55 },
            { name: 'Whirlpool (M51)',  ra_h: 13.498, dec:  47.19,  type: 'spiral',    tilt:  0.2, scale:  8, opacity: 0.5 },
            { name: 'M87',              ra_h: 12.514, dec:  12.39,  type: 'elliptical',tilt:  0.0, scale:  7, opacity: 0.5 },
            { name: 'Sculptor (NGC253)',ra_h:  0.792, dec: -25.29,  type: 'spiral',    tilt:  1.1, scale: 10, opacity: 0.55 },
        ];

        const GR = 3600;
        const galaxySprites = []; // { sprite, name } for raycasting
        for (const g of galaxyData) {
            const ra  = g.ra_h * 15 * Math.PI / 180;
            const dec = g.dec  * Math.PI / 180;
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
                map: galaxyTex(g.type, g.tilt),
                blending: THREE.AdditiveBlending,
                transparent: true, opacity: g.opacity, depthWrite: false
            }));
            sprite.scale.set(g.scale, g.scale, 1);
            const worldPos = new THREE.Vector3(
                GR * Math.cos(dec) * Math.cos(ra),
                GR * Math.sin(dec),
                GR * Math.cos(dec) * Math.sin(ra)
            );
            sprite.position.copy(worldPos);
            scene.add(sprite);
            galaxySprites.push({ sprite, name: g.name, worldPos });
        }

        // ── Galaxy facts ─────────────────────────────────────────────────────
        const galaxyFacts = {
            'Andromeda (M31)':   { type: 'Barred Spiral (SBb)',         distance: '2.537 million ly', diameter: '220,000 ly', stars: '~1 trillion',   fact: 'Largest galaxy in the Local Group. On a collision course with the Milky Way — they will merge in ~4.5 billion years.' },
            'Triangulum (M33)':  { type: 'Spiral (SAcd)',               distance: '2.73 million ly',  diameter: '60,000 ly',  stars: '~40 billion',   fact: 'Third-largest member of the Local Group, barely visible to the naked eye under perfect dark-sky conditions.' },
            'LMC':               { type: 'Irregular / Disrupted Spiral',distance: '163,000 ly',       diameter: '14,000 ly',  stars: '~30 billion',   fact: 'Satellite of the Milky Way. Contains the Tarantula Nebula — the most active star-forming region in the Local Group.' },
            'SMC':               { type: 'Irregular Dwarf (Im)',        distance: '200,000 ly',       diameter: '7,000 ly',   stars: '~3 billion',    fact: 'Named after Ferdinand Magellan. Has a notably higher proportion of young blue stars than the Milky Way.' },
            "Bode's (M81)":      { type: 'Grand Design Spiral (SAab)',  distance: '11.8 million ly',  diameter: '90,000 ly',  stars: '~250 billion',  fact: 'One of the brightest galaxies in the sky. Its spiral arms are being deformed by gravitational interaction with M82.' },
            'Centaurus A':       { type: 'Elliptical / Radio Galaxy',   distance: '13.7 million ly',  diameter: '97,000 ly',  stars: '~100 billion',  fact: 'One of the closest active galactic nuclei. A 55-million-solar-mass black hole shoots relativistic jets thousands of light-years long.' },
            'Sombrero (M104)':   { type: 'Unbarred Spiral (SA(s)a)',    distance: '31.1 million ly',  diameter: '49,000 ly',  stars: '~100 billion',  fact: 'Named for its distinctive shape. Seen nearly edge-on, its broad dust lane and bright bulge are visible in small telescopes.' },
            'Whirlpool (M51)':   { type: 'Grand Design Spiral (Sbc)',   distance: '23 million ly',    diameter: '76,000 ly',  stars: '~100 billion',  fact: 'First galaxy classified as a spiral (1845). Companion NGC 5195 is distorting its arms through tidal forces.' },
            'M87':               { type: 'Giant Elliptical (E0pec)',    distance: '53.5 million ly',  diameter: '240,000 ly', stars: '~1 trillion',   fact: 'Home of the first black hole ever photographed (2019, Event Horizon Telescope). Its plasma jet extends 5,000 light-years.' },
            'Sculptor (NGC253)': { type: 'Intermediate Spiral (SABc)',  distance: '11.4 million ly',  diameter: '90,000 ly',  stars: '~200 billion',  fact: 'One of the brightest galaxies visible from Earth. An intense starburst galaxy forming new stars at a remarkable rate.' },
        };

        // Seeded PRNG (mulberry32)
        function mulberry32(seed) {
            return function() {
                seed |= 0; seed = seed + 0x6D2B79F5 | 0;
                let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
                t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            };
        }

        // Build a galaxy particle system in local space (disk in XZ plane)
        function createGalaxyPoints(type, seed) {
            const rng = mulberry32(seed);
            const R = 52; // galaxy radius in scene units
            const count = (type === 'elliptical') ? 7500 : (type === 'irregular') ? 5500 : 11000;
            const pos = new Float32Array(count * 3);
            const col = new Float32Array(count * 3);

            if (type === 'spiral') {
                // Central bulge — warm yellow/orange stars
                const nB = Math.floor(count * 0.28);
                for (let i = 0; i < nB; i++) {
                    const r = Math.pow(rng(), 2.2) * R * 0.23;
                    const th = rng() * Math.PI * 2, ph = Math.acos(2*rng()-1);
                    pos[i*3]   = r * Math.sin(ph) * Math.cos(th);
                    pos[i*3+1] = r * Math.sin(ph) * Math.sin(th) * 0.42;
                    pos[i*3+2] = r * Math.cos(ph);
                    const w = rng();
                    col[i*3] = 1.0; col[i*3+1] = 0.74+w*0.16; col[i*3+2] = 0.28+w*0.28;
                }
                // Two logarithmic spiral arms — blue/white young stars
                const nA = Math.floor(count * 0.56);
                for (let i = 0; i < nA; i++) {
                    const arm = rng() > 0.5 ? 0 : 1;
                    const t = Math.pow(rng(), 0.55);
                    const angle = arm * Math.PI + t * Math.PI * 2.3;
                    const r = R * 0.07 + t * R * 0.92;
                    const scatter = r * 0.11 * (1 - t * 0.35);
                    const ii = nB + i;
                    pos[ii*3]   = r * Math.cos(angle) + (rng()-0.5)*scatter*2;
                    pos[ii*3+1] = (rng()-0.5) * R * 0.033;
                    pos[ii*3+2] = r * Math.sin(angle) + (rng()-0.5)*scatter*2;
                    const b = rng();
                    col[ii*3] = 0.52+b*0.48; col[ii*3+1] = 0.70+b*0.28; col[ii*3+2] = 1.0;
                }
                // Diffuse disk haze
                const dStart = nB + nA;
                for (let i = dStart; i < count; i++) {
                    const r = Math.pow(rng(), 0.62) * R;
                    const th = rng() * Math.PI * 2;
                    pos[i*3]   = r * Math.cos(th);
                    pos[i*3+1] = (rng()-0.5) * R * 0.038;
                    pos[i*3+2] = r * Math.sin(th);
                    col[i*3] = 0.78; col[i*3+1] = 0.80; col[i*3+2] = 0.92;
                }
            } else if (type === 'elliptical') {
                // de Vaucouleurs-like profile — old yellow/red stars
                for (let i = 0; i < count; i++) {
                    const r = Math.pow(rng(), 2.8) * R;
                    const th = rng() * Math.PI * 2, ph = Math.acos(2*rng()-1);
                    pos[i*3]   = r * Math.sin(ph) * Math.cos(th);
                    pos[i*3+1] = r * Math.sin(ph) * Math.sin(th) * 0.60;
                    pos[i*3+2] = r * Math.cos(ph);
                    const w = rng();
                    col[i*3] = 1.0; col[i*3+1] = 0.58+w*0.32; col[i*3+2] = 0.12+w*0.38;
                }
            } else { // irregular — multiple star-forming clumps, blue-white stars
                const clumps = [
                    { ox: 0,       oz: 0,       r: R*0.50, frac: 0.38 },
                    { ox:  R*0.36, oz:  R*0.24, r: R*0.28, frac: 0.28 },
                    { ox: -R*0.28, oz: -R*0.20, r: R*0.22, frac: 0.20 },
                    { ox:  R*0.10, oz: -R*0.36, r: R*0.18, frac: 0.14 },
                ];
                let idx = 0;
                for (const c of clumps) {
                    const n = Math.floor(count * c.frac);
                    for (let i = 0; i < n && idx < count; i++, idx++) {
                        const r = Math.pow(rng(), 1.4) * c.r;
                        const th = rng() * Math.PI * 2, ph = Math.acos(2*rng()-1);
                        pos[idx*3]   = c.ox + r * Math.sin(ph) * Math.cos(th);
                        pos[idx*3+1] = r * Math.sin(ph) * Math.sin(th) * 0.18;
                        pos[idx*3+2] = c.oz + r * Math.cos(ph);
                        const b = rng();
                        col[idx*3] = 0.38+b*0.62; col[idx*3+1] = 0.62+b*0.36; col[idx*3+2] = 1.0;
                    }
                }
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
            const mat = new THREE.PointsMaterial({
                size: 1.8, vertexColors: true,
                blending: THREE.AdditiveBlending,
                transparent: true, opacity: 0.90,
                depthWrite: false, sizeAttenuation: false,
            });
            const pts = new THREE.Points(geo, mat);
            pts.visible = false;
            return pts;
        }

        // Build one model per galaxy, oriented so disk faces the approaching camera
        const galaxyModels = [];
        galaxyData.forEach((g, i) => {
            const model = createGalaxyPoints(g.type, i * 1337 + 42);
            model.position.copy(galaxySprites[i].worldPos);

            // Disk normal (Y) pointing toward origin (where camera comes from)
            const viewDir = galaxySprites[i].worldPos.clone().normalize();
            const q = new THREE.Quaternion().setFromUnitVectors(
                new THREE.Vector3(0, 1, 0), viewDir.clone().negate()
            );
            model.setRotationFromQuaternion(q);

            // Sombrero is famous for being seen nearly edge-on
            if (g.name === 'Sombrero (M104)') model.rotateX(Math.PI * 0.44);

            // Add a bit of random tilt for visual variety
            const rng2 = mulberry32(i * 997 + 55);
            if (g.type === 'spiral') {
                model.rotateX((rng2()-0.5) * 0.50);
                model.rotateZ((rng2()-0.5) * 0.50);
            } else {
                model.rotateX((rng2()-0.5) * 0.70);
                model.rotateZ((rng2()-0.5) * 0.70);
            }
            scene.add(model);
            galaxyModels.push(model);
        });

        // ── Camera fly state ──────────────────────────────────────────────────
        const flyState = {
            active: false,
            camTarget: new THREE.Vector3(),
            ctrlTarget: new THREE.Vector3(),
            onComplete: null,
            inGalaxyView: false,
            currentGalaxyIdx: -1,
            savedCamPos: new THREE.Vector3(0, 55, 110),
            savedCtrlTarget: new THREE.Vector3(0, 0, 0),
        };

        function flyTo(worldPos, galaxyIdx) {
            // Save solar system viewpoint only on first galaxy jump
            if (!flyState.inGalaxyView) {
                flyState.savedCamPos.copy(camera.position);
                flyState.savedCtrlTarget.copy(controls.target);
            }
            // Hide previous galaxy when switching
            if (flyState.currentGalaxyIdx >= 0 && flyState.currentGalaxyIdx !== galaxyIdx) {
                galaxyModels[flyState.currentGalaxyIdx].visible = false;
            }
            document.getElementById('galaxy-info').style.display = 'none';

            const dir = worldPos.clone().normalize();
            flyState.camTarget.copy(dir).multiplyScalar(3300);
            flyState.ctrlTarget.copy(worldPos);
            flyState.active = true;
            flyState.currentGalaxyIdx = galaxyIdx;
            controls.maxDistance = 5000;

            flyState.onComplete = () => {
                galaxyModels[galaxyIdx].visible = true;
                const g = galaxyData[galaxyIdx];
                const f = galaxyFacts[g.name];
                const el = document.getElementById('galaxy-info');
                el.innerHTML =
                    `<div class="ginfo-name">${g.name}</div>` +
                    `<div class="ginfo-row"><span>Type</span>${f.type}</div>` +
                    `<div class="ginfo-row"><span>Distance</span>${f.distance}</div>` +
                    `<div class="ginfo-row"><span>Diameter</span>${f.diameter}</div>` +
                    `<div class="ginfo-row"><span>Stars</span>${f.stars}</div>` +
                    `<div class="ginfo-fact">${f.fact}</div>`;
                el.style.display = 'block';
                document.getElementById('back-btn').style.display = 'block';
                flyState.inGalaxyView = true;
            };
        }

        function flyBack() {
            if (flyState.currentGalaxyIdx >= 0) {
                galaxyModels[flyState.currentGalaxyIdx].visible = false;
            }
            document.getElementById('galaxy-info').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
            flyState.inGalaxyView = false;
            flyState.currentGalaxyIdx = -1;
            flyState.camTarget.copy(flyState.savedCamPos);
            flyState.ctrlTarget.copy(flyState.savedCtrlTarget);
            flyState.active = true;
            flyState.onComplete = () => { controls.maxDistance = 400; };
        }

        document.getElementById('back-btn').addEventListener('click', flyBack);
        window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && flyState.inGalaxyView) flyBack(); });

        // Galaxy legend — clickable items
        const galaxyLegendEl = document.getElementById('galaxy-legend');
        galaxySprites.forEach((g, i) => {
            const item = document.createElement('div');
            item.className = 'legend-item legend-galaxy';
            item.innerHTML = `<div class="legend-galaxy-icon"></div>${g.name}`;
            item.addEventListener('click', () => flyTo(g.worldPos, i));
            galaxyLegendEl.appendChild(item);
        });

        // Planet texture generators
        const textures = {
            mercury: canvasTex((ctx, s) => {
                ctx.fillStyle = '#8a8a8a'; ctx.fillRect(0, 0, s, s);
                for (let i = 0; i < 100; i++) {
                    ctx.fillStyle = `rgba(50,50,50,${Math.random()*0.5+0.2})`;
                    ctx.beginPath();
                    ctx.arc(Math.random()*s, Math.random()*s, Math.random()*10+1, 0, Math.PI*2);
                    ctx.fill();
                }
            }),
            venus: canvasTex((ctx, s) => {
                const g = ctx.createLinearGradient(0, 0, 0, s);
                g.addColorStop(0, '#e8c060'); g.addColorStop(0.5, '#daa030'); g.addColorStop(1, '#c07820');
                ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
                for (let i = 0; i < 15; i++) {
                    ctx.strokeStyle = `rgba(255,220,100,${Math.random()*0.3+0.1})`;
                    ctx.lineWidth = 6;
                    ctx.beginPath();
                    ctx.arc(Math.random()*s, Math.random()*s, Math.random()*80+30, 0, Math.PI*1.5);
                    ctx.stroke();
                }
            }),
            mars: canvasTex((ctx, s) => {
                const g = ctx.createLinearGradient(0, 0, s, s);
                g.addColorStop(0, '#b84010'); g.addColorStop(0.5, '#d05828'); g.addColorStop(1, '#9a3000');
                ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
                for (let i = 0; i < 60; i++) {
                    ctx.fillStyle = `rgba(70,15,0,${Math.random()*0.4+0.1})`;
                    ctx.beginPath();
                    ctx.arc(Math.random()*s, Math.random()*s, Math.random()*14+2, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.fillStyle = 'rgba(220,200,180,0.85)';
                ctx.fillRect(0, 0, s, s*0.06);
                ctx.fillRect(0, s*0.94, s, s*0.06);
            }),
            jupiter: canvasTex((ctx, s) => {
                const bands = ['#c8a060','#ddb870','#e8cc80','#b07840','#c89060','#d4a870','#e0c090','#c09060'];
                bands.forEach((c, i) => {
                    ctx.fillStyle = c;
                    ctx.fillRect(0, i*(s/bands.length), s, s/bands.length+1);
                });
                for (let i = 0; i < bands.length; i++) {
                    ctx.strokeStyle = `rgba(100,60,20,0.25)`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    for (let x = 0; x <= s; x += 4) {
                        const y = (i+0.5)*(s/bands.length) + Math.sin(x*0.05+i)*6;
                        x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
                    }
                    ctx.stroke();
                }
                ctx.fillStyle = 'rgba(160,55,35,0.75)';
                ctx.beginPath();
                ctx.ellipse(s*0.62, s*0.58, 45, 28, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(200,100,60,0.5)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.ellipse(s*0.62, s*0.58, 55, 35, 0, 0, Math.PI*2);
                ctx.stroke();
            }, 1024),
            saturn: canvasTex((ctx, s) => {
                const bands = ['#e8d498','#f0e0a8','#d8c078','#e4cc90','#f0d8a0','#e0c888'];
                bands.forEach((c, i) => {
                    ctx.fillStyle = c;
                    ctx.fillRect(0, i*(s/bands.length), s, s/bands.length+1);
                });
            }),
            uranus: canvasTex((ctx, s) => {
                const g = ctx.createLinearGradient(0, 0, 0, s);
                g.addColorStop(0, '#a8f0f8'); g.addColorStop(0.3, '#60d8ec'); g.addColorStop(0.7, '#40c8e0'); g.addColorStop(1, '#28a8c0');
                ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
                // Subtle banding
                for (let i = 0; i < 6; i++) {
                    ctx.fillStyle = `rgba(180,240,255,${0.05 + i*0.02})`;
                    ctx.fillRect(0, s*(0.1+i*0.14), s, s*0.05);
                }
            }),
            neptune: canvasTex((ctx, s) => {
                const g = ctx.createLinearGradient(0, 0, 0, s);
                g.addColorStop(0, '#1850b0'); g.addColorStop(0.4, '#2060c8'); g.addColorStop(0.7, '#3070d8'); g.addColorStop(1, '#0830a0');
                ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
                // Bands
                for (let i = 0; i < 4; i++) {
                    ctx.fillStyle = `rgba(80,120,255,0.15)`;
                    ctx.fillRect(0, s*(0.15+i*0.2), s, s*0.07);
                }
                // Great Dark Spot
                ctx.fillStyle = 'rgba(10,10,100,0.7)';
                ctx.beginPath();
                ctx.ellipse(s*0.38, s*0.45, 38, 22, -0.2, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(60,80,200,0.5)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.ellipse(s*0.38, s*0.45, 50, 30, -0.2, 0, Math.PI*2);
                ctx.stroke();
            }),
            saturnRing: canvasTex((ctx, s) => {
                // RingGeometry UV: V goes from inner to outer edge (top to bottom in texture)
                for (let y = 0; y < s; y++) {
                    const t = y / s;
                    let a = 0;
                    if (t > 0.04 && t < 0.22) a = (0.2 + Math.sin(t*120)*0.08) * 0.6;
                    if (t > 0.25 && t < 0.53) a = 0.75 + Math.sin(t*300)*0.1;
                    if (t > 0.53 && t < 0.57) a = 0.03;
                    if (t > 0.57 && t < 0.80) a = 0.45 + Math.sin(t*200)*0.08;
                    if (t > 0.71 && t < 0.735) a = 0.04;
                    if (t > 0.81 && t < 0.84) a = 0.18;
                    ctx.fillStyle = `rgba(200,168,110,${a})`;
                    ctx.fillRect(0, y, s, 1);
                }
            }, 1024)
        };

        // Real Earth/Moon textures from three.js CDN
        const BASE = 'https://raw.githubusercontent.com/mrdoob/three.js/r160/examples/textures/planets/';
        const earthMap     = textureLoader.load(BASE + 'earth_atmos_2048.jpg');
        const earthNormal  = textureLoader.load(BASE + 'earth_normal_2048.jpg');
        const earthSpecMap = textureLoader.load(BASE + 'earth_specular_2048.jpg');
        const earthClouds  = textureLoader.load(BASE + 'earth_clouds_2048.jpg');
        const moonMap      = textureLoader.load(BASE + 'moon_1024.jpg');

        // Real J2000 Keplerian elements. distance = visual semi-major axis (AU-compressed scale)
        // e = eccentricity, inc = inclination to ecliptic (°), period = sidereal years
        const BASE_SPEED = 0.01; // Earth rad/frame
        const planetsData = [
            { name: 'Mercury', tex: textures.mercury, size: 0.55, distance: 11,  e: 0.2056, inc: 7.00,  period: 0.2408, tilt: 0.03,  roughness: 0.9, metalness: 0.1, orbitColor: 0x887766 },
            { name: 'Venus',   tex: textures.venus,   size: 1.05, distance: 17,  e: 0.0068, inc: 3.39,  period: 0.6152, tilt: 3.10,  roughness: 0.6, metalness: 0,   orbitColor: 0xddaa55 },
            { name: 'Earth',   isEarth: true,          size: 1.15, distance: 24,  e: 0.0167, inc: 0.00,  period: 1.0000, tilt: 0.41,                                  orbitColor: 0x4488ff },
            { name: 'Mars',    tex: textures.mars,    size: 0.75, distance: 34,  e: 0.0934, inc: 1.85,  period: 1.8808, tilt: 0.44,  roughness: 0.9, metalness: 0,   orbitColor: 0xcc5533 },
            { name: 'Jupiter', tex: textures.jupiter, size: 3.4,  distance: 53,  e: 0.0489, inc: 1.30,  period: 11.862, tilt: 0.05,  roughness: 0.7, metalness: 0,   orbitColor: 0xcc9944 },
            { name: 'Saturn',  tex: textures.saturn,  size: 2.9,  distance: 72,  e: 0.0565, inc: 2.49,  period: 29.457, tilt: 0.47,  roughness: 0.7, metalness: 0,   hasRing: true, orbitColor: 0xddcc88 },
            { name: 'Uranus',  tex: textures.uranus,  size: 1.9,  distance: 88,  e: 0.0463, inc: 0.77,  period: 84.011, tilt: 1.71,  roughness: 0.3, metalness: 0,   icy: true, orbitColor: 0x55ccdd },
            { name: 'Neptune', tex: textures.neptune, size: 1.8,  distance: 105, e: 0.0097, inc: 1.77,  period: 164.79, tilt: 0.49,  roughness: 0.3, metalness: 0,   icy: true, orbitColor: 0x3366cc }
        ];

        const planets = [];

        // Draws a real Keplerian ellipse: sun at focus, inclination applied
        function orbitLine(a, e, incDeg, color) {
            const b   = a * Math.sqrt(1 - e * e);
            const c   = a * e; // focus offset
            const inc = incDeg * Math.PI / 180;
            const pts = [];
            for (let i = 0; i <= 256; i++) {
                const θ = (i / 256) * Math.PI * 2;
                const px = a * Math.cos(θ) - c;
                const pz = b * Math.sin(θ);
                pts.push(new THREE.Vector3(px, pz * Math.sin(inc), pz * Math.cos(inc)));
            }
            return new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.7 })
            );
        }

        function createPlanet(d) {
            const a      = d.distance;
            const b      = a * Math.sqrt(1 - d.e * d.e);
            const c      = a * d.e;
            const incRad = d.inc * Math.PI / 180;
            scene.add(orbitLine(a, d.e, d.inc, d.orbitColor));

            let mat;
            if (d.isEarth) {
                mat = new THREE.MeshPhongMaterial({
                    map: earthMap, normalMap: earthNormal,
                    specularMap: earthSpecMap,
                    specular: new THREE.Color(0x444444), shininess: 30
                });
            } else if (d.icy) {
                mat = new THREE.MeshPhongMaterial({
                    map: d.tex,
                    specular: new THREE.Color(0x88ccff), shininess: 60
                });
            } else {
                mat = new THREE.MeshStandardMaterial({
                    map: d.tex,
                    roughness: d.roughness ?? 0.82,
                    metalness: d.metalness ?? 0
                });
            }

            const mesh = new THREE.Mesh(new THREE.SphereGeometry(d.size, 64, 64), mat);
            mesh.rotation.z = d.tilt || 0;

            if (d.isEarth) {
                const cloudMesh = new THREE.Mesh(
                    new THREE.SphereGeometry(d.size * 1.012, 64, 64),
                    new THREE.MeshPhongMaterial({ map: earthClouds, transparent: true, opacity: 0.38, depthWrite: false })
                );
                mesh.add(cloudMesh);
                mesh.userData.clouds = cloudMesh;

                // Atmosphere rim
                const atmMat = new THREE.MeshPhongMaterial({
                    color: 0x4488ff, transparent: true, opacity: 0.12,
                    side: THREE.BackSide
                });
                mesh.add(new THREE.Mesh(new THREE.SphereGeometry(d.size * 1.06, 64, 64), atmMat));

                // Moon
                const moon = new THREE.Mesh(
                    new THREE.SphereGeometry(0.27, 32, 32),
                    new THREE.MeshStandardMaterial({ map: moonMap, roughness: 0.95 })
                );
                scene.add(moon);
                mesh.userData.moon = moon;
                mesh.userData.moonAngle = Math.random() * Math.PI * 2;
            }

            if (d.hasRing) {
                const ringMat = new THREE.MeshBasicMaterial({
                    map: textures.saturnRing, side: THREE.DoubleSide,
                    transparent: true, depthWrite: false
                });
                const ring = new THREE.Mesh(new THREE.RingGeometry(d.size * 1.25, d.size * 2.5, 128), ringMat);
                ring.rotation.x = Math.PI / 2;
                mesh.add(ring);
            }

            scene.add(mesh);
            return {
                mesh, name: d.name, a, b, c, incRad,
                speed: BASE_SPEED / d.period,
                angle: Math.random() * Math.PI * 2
            };
        }

        planetsData.forEach(d => planets.push(createPlanet(d)));

        // ── Hover tooltips (raycasting) ───────────────────────────────────────
        const tooltip  = document.getElementById('tooltip');
        const raycaster = new THREE.Raycaster();
        raycaster.params.Points = { threshold: 8 };
        const mouse = new THREE.Vector2(-9999, -9999);

        window.addEventListener('mousemove', (e) => {
            mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            let label = null;

            // 1. Planets + Sun
            const meshTargets = [sun, ...planets.map(p => p.mesh)];
            const meshNames   = ['Sun', ...planets.map(p => p.name)];
            const meshHits = raycaster.intersectObjects(meshTargets, true);
            if (meshHits.length) {
                const idx = meshTargets.indexOf(meshHits[0].object);
                if (idx !== -1) label = meshNames[idx];
                // children (clouds, atmosphere) — find parent planet
                if (!label) {
                    for (let pi = 0; pi < planets.length; pi++) {
                        if (planets[pi].mesh.children.includes(meshHits[0].object)) {
                            label = planets[pi].name; break;
                        }
                    }
                }
            }

            // 2. Galaxies
            if (!label) {
                const gHits = raycaster.intersectObjects(galaxySprites.map(g => g.sprite));
                if (gHits.length) {
                    const hit = galaxySprites.find(g => g.sprite === gHits[0].object);
                    if (hit) label = hit.name;
                }
            }

            // 3. Catalog stars (Points)
            if (!label) {
                const sHits = raycaster.intersectObject(starPoints);
                if (sHits.length) label = starNames[sHits[0].index];
            }

            if (label) {
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 16) + 'px';
                tooltip.style.top  = (e.clientY - 8)  + 'px';
                tooltip.textContent = label;
            } else {
                tooltip.style.display = 'none';
            }
        });

        // Animation
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            sun.rotation.y += 0.0015;
            const pulse = 1 + Math.sin(time * 1.5) * 0.04;
            glow.scale.set(18 * pulse, 18 * pulse, 1);

            for (const p of planets) {
                p.angle += p.speed;
                const px  = p.a * Math.cos(p.angle) - p.c;
                const pzF = p.b * Math.sin(p.angle);
                p.mesh.position.set(px, pzF * Math.sin(p.incRad), pzF * Math.cos(p.incRad));
                p.mesh.rotation.y += 0.008;

                if (p.mesh.userData.clouds) {
                    p.mesh.userData.clouds.rotation.y += 0.002;
                }
                if (p.mesh.userData.moon) {
                    p.mesh.userData.moonAngle += 0.025;
                    const ma = p.mesh.userData.moonAngle;
                    p.mesh.userData.moon.position.set(
                        p.mesh.position.x + Math.cos(ma) * 2.2,
                        p.mesh.position.y + Math.sin(ma) * 0.4,
                        p.mesh.position.z + Math.sin(ma) * 2.2
                    );
                    p.mesh.userData.moon.rotation.y += 0.005;
                }
            }

            // Smooth camera fly-to animation
            if (flyState.active) {
                camera.position.lerp(flyState.camTarget, 0.015);
                controls.target.lerp(flyState.ctrlTarget, 0.015);
                if (camera.position.distanceTo(flyState.camTarget) < 5) {
                    flyState.active = false;
                    if (flyState.onComplete) { flyState.onComplete(); flyState.onComplete = null; }
                }
            }

            controls.update();
            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
