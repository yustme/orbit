        // ── Spacecraft trajectories ───────────────────────────────────────────
        // Horizons ecliptic J2000 → Three.js:  H.x→T.x  H.y→T.z  H.z→T.y
        const scObjects = [];

        if (typeof trajectoryData !== 'undefined') {
            for (const [scName, sc] of Object.entries(trajectoryData)) {
                const pts = sc.points;
                if (!pts || pts.length < 2) continue;

                // Clip at first gap > 5 years between consecutive data points
                const GAP_5Y = 5 * 365.25;
                let effEnd = pts.length - 1;
                for (let i = 1; i < pts.length; i++) {
                    if (pts[i][0] - pts[i-1][0] > GAP_5Y) { effEnd = i - 1; break; }
                }
                const effPts = effEnd < pts.length - 1 ? pts.slice(0, effEnd + 1) : pts;

                const launchDay = effPts[0][0];
                const endDay    = effPts[effPts.length - 1][0];

                // Full trajectory line (visible when active, draw range clipped to simDay)
                // p = [t, hx, hy, hz] in Horizons ecliptic J2000 AU
                const v3pts = effPts.map(p => auPtToScene(p[1], p[2], p[3]));
                const lineGeo = new THREE.BufferGeometry().setFromPoints(v3pts);
                lineGeo.setDrawRange(0, v3pts.length);
                const line    = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({
                    color: sc.color, transparent: true, opacity: 0.22, depthWrite: false
                }));
                line.visible = false;
                solarSystemGroup.add(line);

                // Spacecraft glow sprite
                const dotTex = canvasTex((ctx, s) => {
                    const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
                    g.addColorStop(0,   sc.color);
                    g.addColorStop(0.4, sc.color + 'bb');
                    g.addColorStop(1,   'rgba(0,0,0,0)');
                    ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
                }, 64);
                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
                    map: dotTex, transparent: true, depthWrite: false,
                    blending: THREE.AdditiveBlending
                }));
                sprite.scale.set(2.2, 2.2, 1);
                sprite.visible = false;
                solarSystemGroup.add(sprite);

                // Milestone diamond sprites at known flyby/insertion positions
                const milestones = (SC_MILESTONES[scName] || []).flatMap(m => {
                    const day = dateToDays(m.date);
                    const pos = interpSC(effPts, day);
                    if (!pos) return [];
                    const mTex = canvasTex((ctx, s) => {
                        ctx.save();
                        ctx.translate(s / 2, s / 2);
                        ctx.rotate(Math.PI / 4);
                        const hw = s * 0.3;
                        ctx.strokeStyle = sc.color;
                        ctx.lineWidth = s * 0.08;
                        ctx.strokeRect(-hw, -hw, hw * 2, hw * 2);
                        ctx.fillStyle = sc.color;
                        ctx.globalAlpha = 0.35;
                        ctx.fillRect(-hw, -hw, hw * 2, hw * 2);
                        ctx.restore();
                    }, 48);
                    const mSprite = new THREE.Sprite(new THREE.SpriteMaterial({
                        map: mTex, transparent: true, depthWrite: false,
                        blending: THREE.AdditiveBlending,
                    }));
                    mSprite.scale.set(3, 3, 1);
                    mSprite.position.copy(pos);
                    mSprite.visible = false;
                    mSprite.userData.label = `${scName} — ${m.label} (${m.date})`;
                    solarSystemGroup.add(mSprite);
                    return [{ day, label: m.label, date: m.date, sprite: mSprite }];
                });

                // End-of-data marker at the last known trajectory point.
                // Active: pulsing arrow-dot (data up to fetch date, mission ongoing).
                // Ended/lost: termination cross in ring.
                const lastPt = effPts[effPts.length - 1];
                const endPos = auPtToScene(lastPt[1], lastPt[2], lastPt[3]);
                const lastDate = new Date(J2000_MS + lastPt[0] * 86400000)
                    .toISOString().slice(0, 10);
                const isActive = sc.status === 'active';
                const endTex = canvasTex((ctx, s) => {
                    const cx = s / 2, r = s * 0.38, lw = s * 0.07;
                    if (isActive) {
                        // Dashed ring = "data ends here but mission continues"
                        ctx.strokeStyle = sc.color;
                        ctx.lineWidth = lw;
                        ctx.globalAlpha = 0.9;
                        ctx.setLineDash([s * 0.1, s * 0.08]);
                        ctx.beginPath(); ctx.arc(cx, cx, r, 0, Math.PI * 2); ctx.stroke();
                        ctx.setLineDash([]);
                        // Arrow-right hint
                        ctx.strokeStyle = '#ffffff';
                        ctx.lineWidth = lw * 0.8;
                        ctx.globalAlpha = 0.7;
                        const aw = r * 0.55;
                        ctx.beginPath();
                        ctx.moveTo(cx - aw * 0.6, cx);
                        ctx.lineTo(cx + aw * 0.5, cx);
                        ctx.moveTo(cx + aw * 0.1, cx - aw * 0.4);
                        ctx.lineTo(cx + aw * 0.5, cx);
                        ctx.lineTo(cx + aw * 0.1, cx + aw * 0.4);
                        ctx.stroke();
                    } else {
                        // Solid ring + X = "mission ended here"
                        ctx.strokeStyle = '#ffffff';
                        ctx.lineWidth = lw;
                        ctx.globalAlpha = 0.9;
                        ctx.beginPath(); ctx.arc(cx, cx, r, 0, Math.PI * 2); ctx.stroke();
                        ctx.strokeStyle = sc.color;
                        ctx.lineWidth = lw * 0.8;
                        ctx.globalAlpha = 0.85;
                        const d = r * 0.55;
                        ctx.beginPath(); ctx.moveTo(cx - d, cx - d); ctx.lineTo(cx + d, cx + d); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(cx + d, cx - d); ctx.lineTo(cx - d, cx + d); ctx.stroke();
                    }
                }, 48);
                const endMarker = new THREE.Sprite(new THREE.SpriteMaterial({
                    map: endTex, transparent: true, depthWrite: false,
                    blending: THREE.AdditiveBlending,
                }));
                endMarker.scale.set(3.5, 3.5, 1);
                endMarker.position.copy(endPos);
                endMarker.visible = false;
                const endLabel = isActive
                    ? `${scName} — data through ${lastDate} (mission ongoing)`
                    : `${scName} — mission ended ${lastDate}`;
                endMarker.userData.label = endLabel;
                solarSystemGroup.add(endMarker);

                // Photo icon sprites — camera symbol at each flyby-photo position
                const photoIcons = (SC_FLYBY_PHOTOS[scName] || []).flatMap(ph => {
                    const pos = interpSC(effPts, ph.day);
                    if (!pos) return [];
                    const pTex = canvasTex((ctx, s) => {
                        const cx = s / 2, pad = s * 0.18;
                        // camera body
                        ctx.fillStyle = '#ffffff';
                        ctx.globalAlpha = 0.92;
                        const bx = pad, by = pad + s * 0.12, bw = s - pad * 2, bh = s - pad * 2 - s * 0.12;
                        const r = s * 0.08;
                        ctx.beginPath();
                        ctx.moveTo(bx + r, by); ctx.lineTo(bx + bw - r, by);
                        ctx.arcTo(bx + bw, by, bx + bw, by + r, r);
                        ctx.lineTo(bx + bw, by + bh - r);
                        ctx.arcTo(bx + bw, by + bh, bx + bw - r, by + bh, r);
                        ctx.lineTo(bx + r, by + bh);
                        ctx.arcTo(bx, by + bh, bx, by + bh - r, r);
                        ctx.lineTo(bx, by + r);
                        ctx.arcTo(bx, by, bx + r, by, r);
                        ctx.closePath();
                        ctx.fill();
                        // viewfinder bump
                        ctx.fillStyle = '#ffffff';
                        const vw = bw * 0.28, vh = s * 0.13;
                        ctx.fillRect(cx - vw / 2, pad, vw, vh);
                        // lens circle
                        ctx.globalAlpha = 1;
                        ctx.fillStyle = '#222244';
                        ctx.beginPath();
                        ctx.arc(cx, by + bh * 0.5, bh * 0.3, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = '#ffffff';
                        ctx.lineWidth = s * 0.05;
                        ctx.globalAlpha = 0.7;
                        ctx.beginPath();
                        ctx.arc(cx, by + bh * 0.5, bh * 0.18, 0, Math.PI * 2);
                        ctx.stroke();
                    }, 56);
                    const pSprite = new THREE.Sprite(new THREE.SpriteMaterial({
                        map: pTex, transparent: true, depthWrite: false,
                    }));
                    pSprite.scale.set(4, 4, 1);
                    pSprite.position.copy(pos);
                    pSprite.visible = false;
                    pSprite.userData.photoData = ph;
                    pSprite.userData.scName    = scName;
                    pSprite.userData.label     = `${scName} — ${ph.planet} (${ph.date}) — click to view`;
                    solarSystemGroup.add(pSprite);
                    return [pSprite];
                });

                scObjects.push({ name: scName, color: sc.color, status: sc.status,
                    points: effPts, v3pts, sprite, line, launchDay, endDay, milestones, endMarker, photoIcons });
            }
        }

        // Linear interpolation of spacecraft position at arbitrary simDay
        function interpSC(pts, day) {
            if (day < pts[0][0] || day > pts[pts.length-1][0]) return null;
            let lo = 0, hi = pts.length - 1;
            while (hi - lo > 1) { const m = (lo+hi)>>1; if (pts[m][0] <= day) lo=m; else hi=m; }
            const f = (day - pts[lo][0]) / (pts[hi][0] - pts[lo][0]);
            const hx = pts[lo][1] + f*(pts[hi][1]-pts[lo][1]);
            const hy = pts[lo][2] + f*(pts[hi][2]-pts[lo][2]);
            const hz = pts[lo][3] + f*(pts[hi][3]-pts[lo][3]);
            return auPtToScene(hx, hy, hz);
        }

        // Spacecraft selection — clicking a name shows it and jumps to its launch
        let selectedSC = null;

        const photoMarkersEl = document.getElementById('photo-markers');

        function renderPhotoMarkers(scName, minDay, maxDay) {
            photoMarkersEl.innerHTML = '';
            if (!scName) return;
            const photos = SC_FLYBY_PHOTOS[scName] || [];
            const range  = maxDay - minDay;
            for (const p of photos) {
                const pct = (p.day - minDay) / range;
                if (pct < 0 || pct > 1) continue;
                const icon = document.createElement('div');
                icon.className  = 'pm-icon';
                icon.style.left = (pct * 100) + '%';
                icon.innerHTML  = `<div class="pm-icon-img">📷</div><div class="pm-icon-tick"></div><div class="pm-icon-label">${p.planet}</div>`;
                icon.addEventListener('click', (e) => {
                    e.stopPropagation();
                    simDay = p.day;
                    syncUI();
                    flybyVisible = false;
                    flybyManuallyClosed = false; // allow panel to open when jumping via icon
                    updateFlybyPanel(simDay, scName);
                });
                photoMarkersEl.appendChild(icon);
            }
        }

        function selectSpacecraft(name) {
            selectedSC = (selectedSC === name) ? null : name;

            // Hide flyby panel immediately on deselect
            if (!selectedSC) { flybyPanel.style.display = 'none'; flybyVisible = false; }

            const sel = scObjects.find(s => s.name === selectedSC) || null;

            // Visibility + style for each spacecraft
            for (const sc of scObjects) {
                const isSelected = sc.name === selectedSC;
                sc.line.material.opacity = isSelected ? 0.65 : 0.22;
                sc.sprite.scale.set(isSelected ? 3.5 : 2.2, isSelected ? 3.5 : 2.2, 1);
                // hide non-selected when something is selected
                if (selectedSC && !isSelected) {
                    sc.sprite.visible = false;
                    sc.line.visible   = false;
                }
                // milestone markers, photo icons, and end-of-data marker follow spacecraft selection
                for (const m of sc.milestones) m.sprite.visible = isSelected;
                for (const p of sc.photoIcons) p.visible = isSelected;
                sc.endMarker.visible = isSelected;
                if (sc.legendItem) {
                    sc.legendItem.classList.toggle('sc-selected', isSelected);
                    sc.legendItem.classList.toggle('sc-dimmed', selectedSC !== null && !isSelected);
                }
            }

            // Slider range + jump to launch
            flybyManuallyClosed = false; // reset on spacecraft change
            if (sel) {
                slider.min = Math.floor(sel.launchDay);
                slider.max = Math.ceil(sel.endDay);
                simDay = sel.launchDay;
                renderPhotoMarkers(selectedSC, sel.launchDay, sel.endDay);
            } else {
                slider.min = MIN_DAY;
                slider.max = MAX_DAY;
                renderPhotoMarkers(null, 0, 1);
            }
            syncUI();
        }

        const scLegendEl = document.getElementById('sc-legend');
        for (const sc of scObjects) {
            const item = document.createElement('div');
            item.className = 'legend-item legend-sc';
            item.style.fontSize = '0.7em';
            const dot = sc.status === 'active' ? sc.color : sc.color + '88';
            const hasPhotos = SC_FLYBY_PHOTOS[sc.name] && SC_FLYBY_PHOTOS[sc.name].length > 0;
            const photoTag = hasPhotos ? ` <span style="opacity:0.35;font-size:0.8em;font-style:italic">(with images)</span>` : '';
            item.innerHTML = `<div class="legend-dot" style="background:${dot}"></div>${sc.name}${photoTag}`;
            item.addEventListener('click', () => selectSpacecraft(sc.name));
            sc.legendItem = item;
            scLegendEl.appendChild(item);
        }

        // ── Hover tooltips (raycasting) ───────────────────────────────────────
        const tooltip  = document.getElementById('tooltip');
        const raycaster = new THREE.Raycaster();
        raycaster.params.Points = { threshold: 8 };
        const mouse = new THREE.Vector2(-9999, -9999);

        window.addEventListener('mousemove', (e) => {
            mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            let label = null;

            // 1. Planets + Sun
            const meshTargets = [sun, ...planets.map(p => p.mesh)];
            const meshNames   = ['Sun', ...planets.map(p => p.name)];
            const meshHits = raycaster.intersectObjects(meshTargets, true);
            if (meshHits.length) {
                const idx = meshTargets.indexOf(meshHits[0].object);
                if (idx !== -1) label = meshNames[idx];
                // children (clouds, atmosphere) — find parent planet
                if (!label) {
                    for (let pi = 0; pi < planets.length; pi++) {
                        if (planets[pi].mesh.children.includes(meshHits[0].object)) {
                            label = planets[pi].name; break;
                        }
                    }
                }
            }

            // 2. Galaxies
            if (!label) {
                const gHits = raycaster.intersectObjects(galaxySprites.map(g => g.sprite));
                if (gHits.length) {
                    const hit = galaxySprites.find(g => g.sprite === gHits[0].object);
                    if (hit) label = hit.name;
                }
            }

            // 3. Spacecraft sprites
            if (!label) {
                const visSprites = scObjects.filter(s => s.sprite.visible).map(s => s.sprite);
                if (visSprites.length) {
                    const scHits = raycaster.intersectObjects(visSprites);
                    if (scHits.length) {
                        const hit = scObjects.find(s => s.sprite === scHits[0].object);
                        if (hit) label = hit.name;
                    }
                }
            }

            // 3b. Milestone sprites + end markers
            if (!label) {
                const visMilestones = scObjects.flatMap(s => [
                    ...s.milestones.filter(m => m.sprite.visible).map(m => m.sprite),
                    ...(s.endMarker.visible ? [s.endMarker] : []),
                ]);
                if (visMilestones.length) {
                    const mHits = raycaster.intersectObjects(visMilestones);
                    if (mHits.length) label = mHits[0].object.userData.label;
                }
            }

            // 3c. Photo icon sprites
            let onPhotoIcon = false;
            if (!label) {
                const visPhotoIcons = scObjects.flatMap(s => s.photoIcons.filter(p => p.visible));
                if (visPhotoIcons.length) {
                    const pHits = raycaster.intersectObjects(visPhotoIcons);
                    if (pHits.length) {
                        label = pHits[0].object.userData.label;
                        onPhotoIcon = true;
                    }
                }
            }
            document.body.style.cursor = onPhotoIcon ? 'pointer' : '';

            // 4. Catalog stars (Points)
            if (!label) {
                const sHits = raycaster.intersectObject(starPoints);
                if (sHits.length) label = starNames[sHits[0].index];
            }

            if (label) {
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 16) + 'px';
                tooltip.style.top  = (e.clientY - 8)  + 'px';
                tooltip.textContent = label;
            } else {
                tooltip.style.display = 'none';
            }
        });

        // Click handler — photo icons jump to flyby date and open photo panel
        window.addEventListener('click', (e) => {
            const mx =  (e.clientX / window.innerWidth)  * 2 - 1;
            const my = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(new THREE.Vector2(mx, my), camera);
            const visPhotoIcons = scObjects.flatMap(s => s.photoIcons.filter(p => p.visible));
            if (!visPhotoIcons.length) return;
            const hits = raycaster.intersectObjects(visPhotoIcons);
            if (!hits.length) return;
            const icon = hits[0].object;
            const ph   = icon.userData.photoData;
            const name = icon.userData.scName;
            // Ensure spacecraft is selected
            if (selectedSC !== name) selectSpacecraft(name);
            // Jump to flyby date
            simDay = ph.day;
            flybyPauseUntil = 0; // reset any existing pause
            syncUI();
            // Force flyby panel open immediately
            flybyImg.src = ph.img;
            flybyImg.setAttribute('data-src', ph.img);
            setFlybyTitle(flybyTitle, `${name} — ${ph.planet}`, ph.planet);
            flybyDate.textContent    = ph.date;
            flybyDist.textContent    = ph.approach;
            flybyCaption.textContent = (ph.caption || '') + (ph.credit ? ' ' + ph.credit : '');
            flybyPanel.style.display = 'block';
            flybyVisible = true;
        });

        // ── Focus camera on a planet by name ─────────────────────────────────────
        const planetFlyState = { active: false, startTime: 0, duration: 1400,
            fromPos: new THREE.Vector3(), toPos: new THREE.Vector3(),
            fromTarget: new THREE.Vector3(), toTarget: new THREE.Vector3() };

        function focusPlanet(planetName) {
            const planet = planets.find(p => p.name.toLowerCase() === planetName.toLowerCase());
            if (!planet) return;
            const worldPos = planet.mesh.position.clone();
            const offset   = planet.size * 6;
            planetFlyState.fromPos.copy(camera.position);
            planetFlyState.fromTarget.copy(controls.target);
            planetFlyState.toTarget.copy(worldPos);
            planetFlyState.toPos.copy(worldPos).add(new THREE.Vector3(offset, offset * 0.5, offset));
            planetFlyState.startTime = performance.now();
            planetFlyState.active = true;
            controls.enabled = false;
        }

        function setFlybyTitle(titleEl, label, planetName) {
            titleEl.innerHTML = '';
            const span = document.createElement('span');
            span.className = 'fp-planet-link';
            span.textContent = label;
            span.title = 'Zaměřit kameru na ' + planetName;
            span.addEventListener('click', () => focusPlanet(planetName));
            titleEl.appendChild(span);
        }

        // Animation
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            sun.rotation.y += 0.0015;
            const pulse = 1 + Math.sin(time * 1.5) * 0.04;
            glow.scale.set(18 * pulse, 18 * pulse, 1);

            // Advance simulation time (skip if in flyby auto-pause window)
            if (playing && performance.now() >= flybyPauseUntil) {
                simDay += simSpeed;
                const loopMax = parseFloat(slider.max);
                if (simDay >= loopMax) {
                    simDay = loopMax;
                    playing = false;
                    playBtn.innerHTML = '&#9654;';
                }
                syncUI();
            }

            // Planet positions from Keplerian elements at simDay (ecliptic J2000 frame, full Euler rotation)
            for (let pi = 0; pi < planets.length; pi++) {
                const p   = planets[pi];
                const kep = PLANET_KEPLER[pi];
                const Mrad = ((kep.M0 + kep.n * simDay) % 360) * Math.PI / 180;
                const E   = solveKepler(Mrad, p.e);
                const px  = p.a * Math.cos(E) - p.c;
                const pzF = p.b * Math.sin(E);
                const pos = orbitalToScene(px, pzF, kep.Omega, p.inc, kep.omega, 1);
                p.mesh.position.copy(pos);
                if (playing) {
                    p.mesh.rotation.y += 0.008;
                    if (p.mesh.userData.clouds) {
                        p.mesh.userData.clouds.rotation.y += 0.002;
                    }
                    if (p.mesh.userData.moon) {
                        p.mesh.userData.moonAngle += 0.025;
                        const ma = p.mesh.userData.moonAngle;
                        p.mesh.userData.moon.position.set(
                            p.mesh.position.x + Math.cos(ma) * 2.2,
                            p.mesh.position.y + Math.sin(ma) * 0.4,
                            p.mesh.position.z + Math.sin(ma) * 2.2
                        );
                        p.mesh.userData.moon.rotation.y += 0.005;
                    }
                }
            }

            // Spacecraft positions — only the selected one is shown
            if (selectedSC) {
                const sc = scObjects.find(s => s.name === selectedSC);
                if (sc) {
                    const inMission = simDay >= sc.launchDay && simDay <= sc.endDay;
                    sc.sprite.visible = inMission;
                    sc.line.visible   = inMission;
                    if (inMission) {
                        const pos = interpSC(sc.points, simDay);
                        if (pos) sc.sprite.position.copy(pos);

                        // Clip trajectory line to current simDay
                        const pts = sc.points;
                        let hi = pts.length - 1;
                        let lo = 0;
                        while (hi - lo > 1) { const m = (lo + hi) >> 1; if (pts[m][0] <= simDay) lo = m; else hi = m; }
                        sc.line.geometry.setDrawRange(0, lo + 2);
                    }
                }
            }
            updateFlybyPanel(simDay, selectedSC);

            // Smooth camera fly-to animation
            if (flyState.active) {
                const elapsed = performance.now() - flyState.startTime;
                const t = Math.min(elapsed / flyState.duration, 1.0);
                const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // ease in-out
                camera.position.lerpVectors(flyState.savedCamPos, flyState.camTarget, ease);
                controls.target.lerpVectors(flyState.savedCtrlTarget, flyState.ctrlTarget, ease);
                if (t >= 1.0) {
                    flyState.active = false;
                    controls.enabled = true;
                    if (flyState.onComplete) { flyState.onComplete(); flyState.onComplete = null; }
                }
            }

            if (planetFlyState.active) {
                const elapsed = performance.now() - planetFlyState.startTime;
                const t = Math.min(elapsed / planetFlyState.duration, 1.0);
                const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
                camera.position.lerpVectors(planetFlyState.fromPos, planetFlyState.toPos, ease);
                controls.target.lerpVectors(planetFlyState.fromTarget, planetFlyState.toTarget, ease);
                if (t >= 1.0) {
                    planetFlyState.active = false;
                    controls.enabled = true;
                }
            }

            // Project solar system indicator to screen
            if (solarIndicator.visible) {
                const W = window.innerWidth, H = window.innerHeight;
                const margin = 30;
                const cx = W / 2, cy = H / 2;

                // Transform solar system origin into camera (view) space
                // Camera looks down -Z, so viewZ < 0 means in front, > 0 means behind
                const viewPos = new THREE.Vector3(0, 0, 0)
                    .applyMatrix4(camera.matrixWorldInverse);
                const inFront = viewPos.z < 0;

                let dotX, dotY;
                if (inFront) {
                    // Normal projection — project to NDC and convert to screen
                    const ndc = new THREE.Vector3(0, 0, 0).project(camera);
                    dotX = (ndc.x * 0.5 + 0.5) * W;
                    dotY = (-ndc.y * 0.5 + 0.5) * H;
                } else {
                    // Behind camera: use view-space x,y to get correct screen direction
                    // Negate because we're looking the other way
                    const dx = -viewPos.x;
                    const dy =  viewPos.y;
                    const len = Math.sqrt(dx * dx + dy * dy) || 1;
                    // Scale so the point lands outside the viewport, then clamp
                    dotX = cx + (dx / len) * W;
                    dotY = cy - (dy / len) * H;
                }

                // Clamp to screen edge
                const clampedX = Math.max(margin, Math.min(W - margin, dotX));
                const clampedY = Math.max(margin, Math.min(H - margin, dotY));

                solarDotEl.style.left = clampedX + 'px';
                solarDotEl.style.top  = clampedY + 'px';

                // Label above the dot
                const tagOffsetY = 28;
                solarTagEl.style.left = clampedX + 'px';
                solarTagEl.style.top  = (clampedY - tagOffsetY - 18) + 'px';

                solarLineEl.style.left   = clampedX + 'px';
                solarLineEl.style.top    = (clampedY - tagOffsetY) + 'px';
                solarLineEl.style.height = tagOffsetY + 'px';

                solarMarkerEl.style.display = 'block';
            }

            // Animate solar system scale for galaxy view
            const curS = solarSystemGroup.scale.x;
            const tgtS = flyState.solarScaleTarget;
            if (Math.abs(curS - tgtS) > 0.00001) {
                const ns = curS + (tgtS - curS) * 0.04;
                solarSystemGroup.scale.setScalar(ns);
            }


            controls.update();
            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

        // Hamburger menu for mobile
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const legendEl = document.getElementById('legend');
        if (hamburgerBtn && legendEl) {
            hamburgerBtn.addEventListener('click', () => {
                legendEl.classList.toggle('legend-mobile-open');
            });
        }

    </script>
</body>
</html>
