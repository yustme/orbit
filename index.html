<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solar System</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: sans-serif;
            pointer-events: none;
            z-index: 10;
        }
        #info h1 { font-size: 1.1em; margin: 0 0 4px; letter-spacing: 2px; text-transform: uppercase; }
        #info p { font-size: 0.75em; margin: 0; opacity: 0.5; }
        #gallery-link {
            position: absolute;
            top: 12px;
            right: 16px;
            pointer-events: all;
            z-index: 10;
            color: #aaddff;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 0.72em;
            letter-spacing: 2px;
            border: 1px solid rgba(100,180,255,0.3);
            border-radius: 4px;
            padding: 6px 14px;
            background: rgba(0,0,0,0.55);
            transition: background 0.15s, border-color 0.15s;
        }
        #gallery-link:hover { background: rgba(20,50,90,0.85); border-color: rgba(100,180,255,0.6); }
        #legend {
            position: absolute;
            bottom: 24px;
            right: 20px;
            color: #fff;
            font-family: sans-serif;
            font-size: 0.75em;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.85;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .legend-section {
            font-size: 0.75em;
            letter-spacing: 2px;
            opacity: 0.4;
            text-transform: uppercase;
            margin-top: 8px;
            margin-bottom: 2px;
        }
        .legend-galaxy {
            pointer-events: all;
            cursor: pointer;
            opacity: 0.75;
            transition: opacity 0.15s;
        }
        .legend-galaxy:hover {
            opacity: 1;
            color: #aaddff;
        }
        .legend-sc {
            pointer-events: all;
            cursor: pointer;
            opacity: 0.65;
            transition: opacity 0.15s, color 0.15s;
        }
        .legend-sc:hover { opacity: 1; }
        .legend-sc.sc-selected {
            opacity: 1;
            color: #fff;
            font-weight: bold;
        }
        .legend-sc.sc-dimmed { opacity: 0.2; }
        .legend-galaxy-icon {
            width: 12px;
            height: 7px;
            border-radius: 50%;
            border: 1px solid rgba(180,210,255,0.7);
            transform: rotate(-20deg);
            flex-shrink: 0;
        }
        #galaxy-info {
            position: absolute;
            bottom: 24px;
            left: 20px;
            color: #fff;
            font-family: sans-serif;
            font-size: 0.8em;
            background: rgba(0,0,0,0.75);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            padding: 16px 20px;
            max-width: 320px;
            display: none;
            z-index: 10;
            pointer-events: none;
        }
        #flyby-panel {
            position: absolute;
            top: 58px;
            left: 12px;
            right: 12px;
            bottom: 72px;
            color: #fff;
            font-family: sans-serif;
            font-size: 0.85em;
            display: none;
            z-index: 10;
            pointer-events: none;
            border-radius: 10px;
            overflow: hidden;
        }
        #flyby-close {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 30px;
            height: 30px;
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 50%;
            color: rgba(255,255,255,0.75);
            font-size: 1.1em;
            line-height: 1;
            cursor: pointer;
            pointer-events: all;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s;
            z-index: 11;
        }
        #flyby-close:hover { background: rgba(0,0,0,0.85); color: #fff; }
        #flyby-panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 10px;
        }
        #flyby-panel .fp-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.88) 40%);
            padding: 32px 28px 22px;
            border-radius: 0 0 10px 10px;
        }
        #flyby-panel .fp-title {
            font-size: 1.6em;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #aaddff;
            margin-bottom: 10px;
            font-weight: 300;
        }
        #flyby-panel .fp-planet-link {
            cursor: pointer;
            border-bottom: 1px solid rgba(170,210,255,0.45);
            transition: color 0.15s, border-color 0.15s;
        }
        #flyby-panel .fp-planet-link:hover {
            color: #ffffff;
            border-color: rgba(255,255,255,0.7);
        }
        #flyby-panel .fp-meta {
            display: flex;
            gap: 32px;
            margin-bottom: 10px;
            font-size: 0.88em;
        }
        #flyby-panel .fp-row { opacity: 0.9; }
        #flyby-panel .fp-row span {
            opacity: 0.5;
            margin-right: 8px;
        }
        #flyby-panel .fp-caption {
            font-style: italic;
            opacity: 0.6;
            font-size: 0.82em;
            line-height: 1.55;
            max-width: 680px;
        }
        .ginfo-name {
            font-size: 1.15em;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: #aaddff;
            text-transform: uppercase;
        }
        .ginfo-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 5px;
            opacity: 0.85;
        }
        .ginfo-row span { opacity: 0.45; flex-shrink: 0; }
        .ginfo-fact {
            margin-top: 10px;
            font-style: italic;
            opacity: 0.6;
            font-size: 0.88em;
            line-height: 1.55;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 8px;
        }
        #back-btn {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            background: rgba(0,0,0,0.7);
            color: #aaddff;
            border: 1px solid rgba(100,180,255,0.3);
            border-radius: 4px;
            padding: 8px 22px;
            font-family: sans-serif;
            font-size: 0.78em;
            letter-spacing: 2px;
            cursor: pointer;
            z-index: 20;
        }
        #back-btn:hover { background: rgba(20,50,90,0.85); border-color: rgba(100,180,255,0.6); }
        #solar-marker {
            position: absolute;
            display: none;
            pointer-events: none;
            z-index: 15;
        }
        #solar-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #88ccff;
            box-shadow: 0 0 6px 2px rgba(100,180,255,0.8);
            position: absolute;
            transform: translate(-50%, -50%);
        }
        #solar-tag {
            position: absolute;
            background: rgba(0,0,0,0.72);
            color: #aaddff;
            font-family: sans-serif;
            font-size: 0.7em;
            letter-spacing: 1.5px;
            padding: 3px 9px;
            border-radius: 3px;
            border: 1px solid rgba(100,180,255,0.35);
            white-space: nowrap;
            transform: translate(-50%, 0);
        }
        #solar-line {
            position: absolute;
            width: 1px;
            background: rgba(100,180,255,0.4);
            transform-origin: top center;
        }
        #time-controls {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.78);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            padding: 10px 18px;
            color: #fff;
            font-family: sans-serif;
            font-size: 0.8em;
            z-index: 10;
            white-space: nowrap;
            user-select: none;
        }
        #play-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            border-radius: 4px;
            width: 30px; height: 30px;
            cursor: pointer;
            font-size: 1em;
            padding: 0;
            flex-shrink: 0;
        }
        #play-btn:hover { border-color: rgba(100,180,255,0.6); color: #aaddff; }
        #slider-wrap {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        #time-slider {
            width: 340px;
            cursor: pointer;
            accent-color: #4488ff;
        }
        #photo-markers {
            position: relative;
            height: 22px;
            pointer-events: none;
        }
        .pm-icon {
            position: absolute;
            transform: translateX(-50%);
            cursor: pointer;
            pointer-events: all;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            opacity: 0.75;
            transition: opacity 0.12s, transform 0.12s;
        }
        .pm-icon:hover { opacity: 1; transform: translateX(-50%) translateY(-2px); }
        .pm-icon-img {
            font-size: 13px;
            line-height: 1;
        }
        .pm-icon-tick {
            width: 1px;
            height: 5px;
            background: rgba(255,180,60,0.7);
        }
        .pm-icon-label {
            display: none;
            position: absolute;
            bottom: 26px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #ffdd88;
            font-size: 0.68em;
            white-space: nowrap;
            padding: 3px 7px;
            border-radius: 3px;
            pointer-events: none;
        }
        .pm-icon:hover .pm-icon-label { display: block; }
        #date-display {
            min-width: 114px;
            text-align: center;
            letter-spacing: 1px;
            color: #aaddff;
        }
        #speed-select {
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 4px;
            padding: 3px 8px;
            font-size: 0.85em;
            cursor: pointer;
        }
        #tooltip {
            position: absolute;
            pointer-events: none;
            z-index: 100;
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 5px 12px;
            border-radius: 4px;
            font-family: sans-serif;
            font-size: 0.78em;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.18);
            display: none;
            white-space: nowrap;
        }
        #hamburger-btn {
            display: none;
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 1100;
            background: rgba(0,0,0,0.7);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 18px;
            cursor: pointer;
            min-width: 44px;
            min-height: 44px;
        }
        @media (max-width: 768px) {
            #hamburger-btn {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            #gallery-link {
                right: 64px;
            }
            #legend {
                display: none;
            }
            #legend.legend-mobile-open {
                display: flex;
                z-index: 1050;
            }
            #time-slider {
                width: calc(100vw - 120px);
            }
            #play-btn {
                min-width: 44px;
                min-height: 44px;
            }
            #flyby-panel {
                left: 0;
                right: 0;
                width: 100%;
                max-height: 85vh;
                overflow-y: auto;
            }
            #galaxy-info {
                left: 0;
                right: 0;
                bottom: 72px;
                max-width: none;
                max-height: 35vh;
                overflow-y: auto;
            }
        }
        @media (pointer: coarse) {
            #tooltip {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>3D Solar System</h1>
        <p>LMB: Rotate &nbsp;|&nbsp; Scroll: Zoom &nbsp;|&nbsp; RMB: Pan</p>
    </div>

    <a id="gallery-link" href="gallery.html">Photos &#8599;</a>
    <div id="tooltip"></div>
    <div id="galaxy-info"></div>
    <div id="flyby-panel">
        <img id="flyby-img" src="" alt="">
        <button id="flyby-close">&#x2715;</button>
        <div class="fp-overlay">
            <div class="fp-title" id="flyby-title"></div>
            <div class="fp-meta">
                <div class="fp-row"><span>Date</span><span id="flyby-date"></span></div>
                <div class="fp-row"><span>Closest approach</span><span id="flyby-dist"></span></div>
            </div>
            <div class="fp-caption" id="flyby-caption"></div>
        </div>
    </div>
    <button id="hamburger-btn" aria-label="Toggle menu">&#9776;</button>
    <button id="back-btn">&#8592; Back to Solar System</button>
    <div id="solar-marker">
        <div id="solar-dot"></div>
        <div id="solar-line"></div>
        <div id="solar-tag">Our Solar System</div>
    </div>

    <div id="time-controls">
        <button id="play-btn">&#9654;</button>
        <div id="slider-wrap">
            <div id="photo-markers"></div>
            <input type="range" id="time-slider" min="-10225" max="9610" value="9610" step="1">
        </div>
        <div id="date-display">Apr 22, 2026</div>
        <select id="speed-select">
            <option value="0.1">0.1 d/frame</option>
            <option value="1" selected>1 d/frame</option>
            <option value="5">5 d/frame</option>
            <option value="10">10 d/frame</option>
            <option value="30">30 d/frame</option>
            <option value="100">100 d/frame</option>
        </select>
    </div>

    <div id="legend">
        <div class="legend-section">Planets</div>
        <div class="legend-item"><div class="legend-dot" style="background:#887766"></div>Mercury</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ddaa55"></div>Venus</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4488ff"></div>Earth</div>
        <div class="legend-item"><div class="legend-dot" style="background:#cc5533"></div>Mars</div>
        <div class="legend-item"><div class="legend-dot" style="background:#cc9944"></div>Jupiter</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ddcc88"></div>Saturn</div>
        <div class="legend-item"><div class="legend-dot" style="background:#55ccdd"></div>Uranus</div>
        <div class="legend-item"><div class="legend-dot" style="background:#3366cc"></div>Neptune</div>
        <div class="legend-section">Galaxies</div>
        <div id="galaxy-legend"></div>
        <div class="legend-section" style="margin-top:10px">Spacecraft</div>
        <div id="sc-legend"></div>
    </div>

    <script src="trajectories_data.js"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // Detect touch device and show appropriate instructions
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        const infoInstructions = document.querySelector('#info p');
        if (isTouchDevice && infoInstructions) {
            infoInstructions.textContent = '1 prst: Rotace | 2 prsty: Zoom';
        }

        // Scene
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 20000);
        camera.position.set(0, 55, 110);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.9;
        document.body.appendChild(renderer.domElement);

        // Post-processing: bloom
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.5, 0.3, 0.92
        );
        composer.addPass(bloomPass);
        composer.addPass(new OutputPass());

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.zoomSpeed = 6.0;
        controls.minDistance = 4;
        controls.maxDistance = 400;

        // Three.js r155+ uses physical light units by default - legacy mode needed
        renderer.useLegacyLights = true;

        // Lighting - ambient gives dark sides a faint blue glow, sun has linear falloff
        scene.add(new THREE.AmbientLight(0x2244aa, 0.7));
        const sunLight = new THREE.PointLight(0xfff5e0, 2.2, 250, 1);
        scene.add(sunLight);

        const textureLoader = new THREE.TextureLoader();

        function canvasTex(fn, size = 512) {
            const c = document.createElement('canvas');
            c.width = c.height = size;
            fn(c.getContext('2d'), size);
            return new THREE.CanvasTexture(c);
        }

        // Sun texture
        const sunTex = canvasTex((ctx, s) => {
            const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
            g.addColorStop(0,   '#fffde0');
            g.addColorStop(0.2, '#ffe066');
            g.addColorStop(0.5, '#ff9900');
            g.addColorStop(0.8, '#e05000');
            g.addColorStop(1,   '#992200');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, s, s);
            for (let i = 0; i < 300; i++) {
                const x = Math.random() * s, y = Math.random() * s;
                const r = Math.random() * 25 + 5;
                ctx.fillStyle = `rgba(255,240,100,${Math.random() * 0.25})`;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }
        }, 1024);

        const sun = new THREE.Mesh(
            new THREE.SphereGeometry(5, 64, 64),
            new THREE.MeshBasicMaterial({ map: sunTex })
        );
        const solarSystemGroup = new THREE.Group();
        scene.add(solarSystemGroup);

        // Galaxy-view indicator: glowing dot at solar system origin
        const solarIndicatorTex = canvasTex((ctx, s) => {
            const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
            g.addColorStop(0,   'rgba(150,210,255,1)');
            g.addColorStop(0.3, 'rgba(100,180,255,0.7)');
            g.addColorStop(1,   'rgba(0,0,0,0)');
            ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
        }, 64);
        const solarIndicator = new THREE.Sprite(new THREE.SpriteMaterial({
            map: solarIndicatorTex, blending: THREE.AdditiveBlending,
            transparent: true, depthWrite: false
        }));
        solarIndicator.scale.set(4, 4, 1);
        solarIndicator.position.set(0, 0, 0);
        solarIndicator.visible = false;
        scene.add(solarIndicator); // world space, NOT in solarSystemGroup

        const solarMarkerEl = document.getElementById('solar-marker');
        const solarDotEl    = document.getElementById('solar-dot');
        const solarLineEl   = document.getElementById('solar-line');
        const solarTagEl    = document.getElementById('solar-tag');
        const solarLabelEl  = solarMarkerEl; // alias for show/hide calls below

        solarSystemGroup.add(sun);

        // Sun glow sprite
        const glowTex = canvasTex((ctx, s) => {
            const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
            g.addColorStop(0,    'rgba(255,220,80,0.5)');
            g.addColorStop(0.3,  'rgba(255,140,20,0.2)');
            g.addColorStop(0.7,  'rgba(255,80,0,0.05)');
            g.addColorStop(1,    'rgba(0,0,0,0)');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, s, s);
        }, 512);
        const glow = new THREE.Sprite(new THREE.SpriteMaterial({
            map: glowTex, blending: THREE.AdditiveBlending,
            transparent: true, depthWrite: false
        }));
        glow.scale.set(18, 18, 1);
        solarSystemGroup.add(glow);

        // ── Milky Way panorama skybox ─────────────────────────────────────────
        // Real ESO photo of the full Milky Way (equirectangular projection)
        const skyTex = textureLoader.load('textures/milky_way.jpg');
        skyTex.colorSpace = THREE.SRGBColorSpace;
        scene.add(new THREE.Mesh(
            new THREE.SphereGeometry(15000, 64, 32),
            new THREE.MeshBasicMaterial({ map: skyTex, side: THREE.BackSide })
        ));

        // ── Bright stars — real Hipparcos catalog (RA h, Dec °, Vmag, B-V) ────
        // Converted to 3D: x=r·cos(dec)·cos(ra), y=r·sin(dec), z=r·cos(dec)·sin(ra)
        // [RA_h, Dec_deg, Vmag, B-V, name]
        const catalog = [
            [6.753,-16.716,-1.46, 0.00,'Sirius (α CMa)'],
            [6.399,-52.696,-0.74, 0.15,'Canopus (α Car)'],
            [14.660,-60.835,-0.27, 0.71,'Rigil Kentaurus (α Cen)'],
            [14.261, 19.182,-0.05, 1.23,'Arcturus (α Boo)'],
            [18.616, 38.783, 0.03, 0.00,'Vega (α Lyr)'],
            [5.278,  45.998, 0.08, 0.80,'Capella (α Aur)'],
            [5.242,  -8.202, 0.13,-0.03,'Rigel (β Ori)'],
            [7.655,   5.225, 0.34, 0.42,'Procyon (α CMi)'],
            [1.628, -57.237, 0.45,-0.16,'Achernar (α Eri)'],
            [5.919,   7.407, 0.50, 1.85,'Betelgeuse (α Ori)'],
            [14.064,-60.374, 0.61,-0.23,'Hadar (β Cen)'],
            [19.846,  8.868, 0.76, 0.22,'Altair (α Aql)'],
            [12.443,-63.099, 0.76,-0.24,'Acrux (α Cru)'],
            [4.599,  16.509, 0.87, 1.54,'Aldebaran (α Tau)'],
            [16.490,-26.432, 0.96, 1.83,'Antares (α Sco)'],
            [13.420,-11.161, 1.04,-0.24,'Spica (α Vir)'],

        function galaxyTex(type, tilt) {
            return canvasTex((ctx, s) => {
                ctx.translate(s / 2, s / 2);
                ctx.rotate(tilt || 0);
                if (type === 'spiral') {
                    // Disk
                    const disk = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 0.45);
                    disk.addColorStop(0,   'rgba(255,245,210,0.85)');
                    disk.addColorStop(0.2, 'rgba(230,200,150,0.35)');
                    disk.addColorStop(1,   'rgba(0,0,0,0)');
                    ctx.fillStyle = disk;
                    ctx.beginPath(); ctx.ellipse(0, 0, s*0.45, s*0.22, 0, 0, Math.PI*2); ctx.fill();
                    // Two spiral arms
                    for (let arm = 0; arm < 2; arm++) {
                        ctx.beginPath();
                        ctx.strokeStyle = 'rgba(220,200,160,0.4)';
                        ctx.lineWidth = s * 0.05;
                        ctx.lineCap = 'round';
                        for (let t = 0; t <= 1; t += 0.02) {
                            const a = arm * Math.PI + t * Math.PI * 1.3;
                            const r = t * s * 0.43;
                            const x = Math.cos(a) * r, y = Math.sin(a) * r * 0.45;
                            t === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                        }
                        ctx.stroke();
                    }
                    // Bright core
                    const core = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 0.1);
                    core.addColorStop(0, 'rgba(255,250,230,0.95)');
                    core.addColorStop(1, 'rgba(255,220,150,0)');
                    ctx.fillStyle = core;
                    ctx.beginPath(); ctx.arc(0, 0, s * 0.1, 0, Math.PI * 2); ctx.fill();
                } else if (type === 'elliptical') {
                    const g = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 0.42);
                    g.addColorStop(0,   'rgba(255,240,200,0.9)');
                    g.addColorStop(0.35,'rgba(230,200,150,0.4)');
                    g.addColorStop(1,   'rgba(0,0,0,0)');
                    ctx.fillStyle = g;
                    ctx.beginPath(); ctx.ellipse(0, 0, s*0.42, s*0.3, 0, 0, Math.PI*2); ctx.fill();
                } else if (type === 'keboola') {
                    // Outer glow in Keboola blue
                    const glow = ctx.createRadialGradient(0, -s*0.10, 0, 0, 0, s*0.46);
                    glow.addColorStop(0,   'rgba(60, 160, 255, 0.70)');
                    glow.addColorStop(0.4, 'rgba(30, 100, 200, 0.28)');
                    glow.addColorStop(1,   'rgba(0,    0,   0, 0)');
                    ctx.fillStyle = glow;
                    ctx.beginPath(); ctx.arc(0, 0, s*0.46, 0, Math.PI*2); ctx.fill();
                    // Head oval (upper portion)
                    ctx.fillStyle = 'rgba(60, 160, 255, 0.58)';
                    ctx.beginPath();
                    ctx.ellipse(0, -s*0.13, s*0.24, s*0.28, 0, 0, Math.PI*2);
                    ctx.fill();
                    // Eyes — two bright circles
                    ctx.fillStyle = 'rgba(210, 240, 255, 0.95)';
                    ctx.beginPath(); ctx.arc(-s*0.07, -s*0.02, s*0.038, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc( s*0.07, -s*0.02, s*0.038, 0, Math.PI*2); ctx.fill();
                    // Arms — sweeping bezier curves outward and down
                    ctx.strokeStyle = 'rgba(100, 195, 255, 0.55)';
                    ctx.lineWidth = s * 0.042;
                    ctx.lineCap = 'round';
                    for (const sx of [-1, 1]) {
                        ctx.beginPath();
                        ctx.moveTo(sx*s*0.10, s*0.05);
                        ctx.bezierCurveTo(sx*s*0.42, s*0.02, sx*s*0.40, s*0.22, sx*s*0.26, s*0.36);
                        ctx.stroke();
                    }
                    // Core brightness at head center
                    const core = ctx.createRadialGradient(0, -s*0.10, 0, 0, -s*0.10, s*0.09);
                    core.addColorStop(0, 'rgba(215, 242, 255, 0.92)');
                    core.addColorStop(1, 'rgba(60,  160, 255, 0)');
                    ctx.fillStyle = core;
                    ctx.beginPath(); ctx.arc(0, -s*0.10, s*0.09, 0, Math.PI*2); ctx.fill();
                } else { // irregular (Magellanic Clouds)
                    const g = ctx.createRadialGradient(0, -s*0.05, 0, 0, 0, s * 0.46);
                    g.addColorStop(0,   'rgba(210,225,255,0.85)');
                    g.addColorStop(0.5, 'rgba(180,200,245,0.35)');
                    g.addColorStop(1,   'rgba(0,0,0,0)');
                    ctx.fillStyle = g;
                    ctx.beginPath(); ctx.ellipse(0, 0, s*0.46, s*0.38, 0.4, 0, Math.PI*2); ctx.fill();
                    // Star-forming knots
                    for (let k = 0; k < 4; k++) {
                        const kx = (Math.random()-0.5)*s*0.28, ky = (Math.random()-0.5)*s*0.28;
                        const kg = ctx.createRadialGradient(kx, ky, 0, kx, ky, s*0.07);
                        kg.addColorStop(0, 'rgba(200,215,255,0.45)');
                        kg.addColorStop(1, 'rgba(0,0,0,0)');
                        ctx.fillStyle = kg;
                        ctx.beginPath(); ctx.arc(kx, ky, s*0.07, 0, Math.PI*2); ctx.fill();
                    }
                }
            }, 256);
        }

        // Seeded PRNG (mulberry32)
        function mulberry32(seed) {
            return function() {
                seed |= 0; seed = seed + 0x6D2B79F5 | 0;
                let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
                t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            };
        }

        // Build a galaxy particle system in local space (disk in XZ plane)
        function createGalaxyPoints(type, seed) {
            const rng = mulberry32(seed);
            const R = 52; // galaxy radius in scene units
            const count = (type === 'keboola') ? 16000 : (type === 'elliptical') ? 7500 : (type === 'irregular') ? 5500 : 11000;
            const pos = new Float32Array(count * 3);
            const col = new Float32Array(count * 3);

            if (type === 'spiral') {
                // Central bulge — warm yellow/orange stars
                const nB = Math.floor(count * 0.28);
                for (let i = 0; i < nB; i++) {
                    const r = Math.pow(rng(), 2.2) * R * 0.23;
                    const th = rng() * Math.PI * 2, ph = Math.acos(2*rng()-1);
                    pos[i*3]   = r * Math.sin(ph) * Math.cos(th);
                    pos[i*3+1] = r * Math.sin(ph) * Math.sin(th) * 0.42;
                    pos[i*3+2] = r * Math.cos(ph);
                    const w = rng();
                    col[i*3] = 1.0; col[i*3+1] = 0.74+w*0.16; col[i*3+2] = 0.28+w*0.28;
                }
                // Two logarithmic spiral arms — blue/white young stars
                const nA = Math.floor(count * 0.56);
                for (let i = 0; i < nA; i++) {
                    const arm = rng() > 0.5 ? 0 : 1;
                    const t = Math.pow(rng(), 0.55);
                    const angle = arm * Math.PI + t * Math.PI * 2.3;
                    const r = R * 0.07 + t * R * 0.92;
                    const scatter = r * 0.11 * (1 - t * 0.35);
                    const ii = nB + i;
                    pos[ii*3]   = r * Math.cos(angle) + (rng()-0.5)*scatter*2;
                    pos[ii*3+1] = (rng()-0.5) * R * 0.033;
                    pos[ii*3+2] = r * Math.sin(angle) + (rng()-0.5)*scatter*2;
                    const b = rng();
                    col[ii*3] = 0.52+b*0.48; col[ii*3+1] = 0.70+b*0.28; col[ii*3+2] = 1.0;
                }
                // Diffuse disk haze
                const dStart = nB + nA;
                for (let i = dStart; i < count; i++) {
                    const r = Math.pow(rng(), 0.62) * R;
                    const th = rng() * Math.PI * 2;
                    pos[i*3]   = r * Math.cos(th);
                    pos[i*3+1] = (rng()-0.5) * R * 0.038;
                    pos[i*3+2] = r * Math.sin(th);
                    col[i*3] = 0.78; col[i*3+1] = 0.80; col[i*3+2] = 0.92;
                }
            } else if (type === 'elliptical') {
                // de Vaucouleurs-like profile — old yellow/red stars
                for (let i = 0; i < count; i++) {
                    const r = Math.pow(rng(), 2.8) * R;
                    const th = rng() * Math.PI * 2, ph = Math.acos(2*rng()-1);
                    pos[i*3]   = r * Math.sin(ph) * Math.cos(th);
                    pos[i*3+1] = r * Math.sin(ph) * Math.sin(th) * 0.60;
                    pos[i*3+2] = r * Math.cos(ph);
                    const w = rng();
                    col[i*3] = 1.0; col[i*3+1] = 0.58+w*0.32; col[i*3+2] = 0.12+w*0.38;
                }
            } else if (type === 'keboola') {
                // Keboola logo character: head + eyes + arms + legs, in Keboola blue (#3ca0ff)
                const kBlue   = [0.24, 0.63, 1.00]; // #3ca0ff
                const kLight  = [0.55, 0.83, 1.00]; // lighter blue highlight
                const kWhite  = [0.88, 0.96, 1.00]; // white-hot core
                const kOrange = [1.00, 0.48, 0.08]; // failed ETL jobs
                const kGreen  = [0.18, 1.00, 0.52]; // successful transforms

                // ── Head oval ────────────────────────────────────────────────────
                // SVG center (32, 20) → galaxy (0, +20), radii 24 × 30
                const nHead = Math.floor(count * 0.28);
                for (let i = 0; i < nHead; i++) {
                    const r = Math.pow(rng(), 1.7);
                    const th = rng() * Math.PI * 2;
                    pos[i*3]   = r * 24 * Math.cos(th);
                    pos[i*3+1] = (rng()-0.5) * R * 0.04;
                    pos[i*3+2] = 20 + r * 30 * Math.sin(th);
                    const br = rng();
                    const clr = br > 0.85 ? kWhite : br > 0.5 ? kLight : kBlue;
                    col[i*3]=clr[0]; col[i*3+1]=clr[1]; col[i*3+2]=clr[2];
                }

                // ── Eyes (two dense circles) ──────────────────────────────────
                // SVG left (28.6, 33.7) → galaxy (−5.5, −2.75), radius ~4.5
                // SVG right (35.4, 33.7) → galaxy (+5.5, −2.75), radius ~4.5
                const nEye = Math.floor(count * 0.06);
                for (let e = 0; e < 2; e++) {
                    const eCX = e === 0 ? -5.5 : 5.5;
                    const eBase = nHead + e * nEye;
                    for (let i = 0; i < nEye; i++) {
                        const r = Math.pow(rng(), 0.6) * 4.5;
                        const th = rng() * Math.PI * 2;
                        const ii = eBase + i;
                        pos[ii*3]   = eCX + r * Math.cos(th);
                        pos[ii*3+1] = (rng()-0.5) * R * 0.02;
                        pos[ii*3+2] = -2.75 + r * Math.sin(th);
                        col[ii*3]=kWhite[0]; col[ii*3+1]=kWhite[1]; col[ii*3+2]=kWhite[2];
                    }
                }

                // ── Arms (cubic bezier, sweeping outward then curving down) ──
                const nArm = Math.floor(count * 0.16);
                const armBase = nHead + 2 * nEye;
                for (let a = 0; a < 2; a++) {
                    const sg = a === 0 ? -1 : 1;
                    const aBase = armBase + a * nArm;
                    // Bezier: (±8,−8) → (±42,−5) → (±38,−20) → (±22,−32)
                    const p0x = sg*8,  p0z = -8;
                    const p1x = sg*42, p1z = -5;
                    const p2x = sg*38, p2z = -20;
                    const p3x = sg*22, p3z = -32;
                    for (let i = 0; i < nArm; i++) {
                        const t = rng();
                        const u = 1 - t;
                        const bx = u*u*u*p0x + 3*u*u*t*p1x + 3*u*t*t*p2x + t*t*t*p3x;
                        const bz = u*u*u*p0z + 3*u*u*t*p1z + 3*u*t*t*p2z + t*t*t*p3z;
                        const sc = R * 0.05 * (1 - t * 0.4);
                        const ii = aBase + i;
                        pos[ii*3]   = bx + (rng()-0.5)*sc*2;
                        pos[ii*3+1] = (rng()-0.5)*R*0.03;
                        pos[ii*3+2] = bz + (rng()-0.5)*sc;
                        const br = rng();
                        const clr = br > 0.68 ? kLight : kBlue;
                        col[ii*3]=clr[0]; col[ii*3+1]=clr[1]; col[ii*3+2]=clr[2];
                    }
                }

                // ── Legs (two streams curving inward downward) ────────────────
                const nLeg = Math.floor(count * 0.12);
                const legBase = armBase + 2 * nArm;
                for (let l = 0; l < 2; l++) {
                    const sg = l === 0 ? -1 : 1;
                    const lBase = legBase + l * nLeg;
                    for (let i = 0; i < nLeg; i++) {
                        const t = Math.pow(rng(), 0.75);
                        const lx = sg * (22 - t * 12);   // ±22 → ±10
                        const lz = -32 - t * 20;          // −32 → −52
                        const ii = lBase + i;
                        pos[ii*3]   = lx + (rng()-0.5)*R*0.045;
                        pos[ii*3+1] = (rng()-0.5)*R*0.03;
                        pos[ii*3+2] = lz + (rng()-0.5)*R*0.04;
                        const br = rng();
                        const clr = br > 0.68 ? kLight : kBlue;
                        col[ii*3]=clr[0]; col[ii*3+1]=clr[1]; col[ii*3+2]=clr[2];
                    }
                }

                // ── Pipeline sparks ───────────────────────────────────────────
                const spBase = legBase + 2 * nLeg;
                for (let i = spBase; i < count; i++) {
                    const r2 = R * 0.08 + rng() * R * 0.52;
                    const th = rng() * Math.PI * 2;
                    pos[i*3]   = r2 * Math.cos(th);
                    pos[i*3+1] = (rng()-0.5) * R * 0.05;
                    pos[i*3+2] = r2 * Math.sin(th) * 0.55 - 5;
                    const clr = rng() > 0.62 ? kOrange : kGreen;
                    col[i*3]=clr[0]; col[i*3+1]=clr[1]; col[i*3+2]=clr[2];
                }
            } else { // irregular — multiple star-forming clumps, blue-white stars
                const clumps = [
                    { ox: 0,       oz: 0,       r: R*0.50, frac: 0.38 },
                    { ox:  R*0.36, oz:  R*0.24, r: R*0.28, frac: 0.28 },
                    { ox: -R*0.28, oz: -R*0.20, r: R*0.22, frac: 0.20 },
                    { ox:  R*0.10, oz: -R*0.36, r: R*0.18, frac: 0.14 },
                ];
                let idx = 0;
                for (const c of clumps) {
                    const n = Math.floor(count * c.frac);
                    for (let i = 0; i < n && idx < count; i++, idx++) {
                        const r = Math.pow(rng(), 1.4) * c.r;
                        const th = rng() * Math.PI * 2, ph = Math.acos(2*rng()-1);
                        pos[idx*3]   = c.ox + r * Math.sin(ph) * Math.cos(th);
                        pos[idx*3+1] = r * Math.sin(ph) * Math.sin(th) * 0.18;
                        pos[idx*3+2] = c.oz + r * Math.cos(ph);
                        const b = rng();
                        col[idx*3] = 0.38+b*0.62; col[idx*3+1] = 0.62+b*0.36; col[idx*3+2] = 1.0;
                    }
                }
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
            const mat = new THREE.PointsMaterial({
                size: 1.8, vertexColors: true,
                blending: THREE.AdditiveBlending,
                transparent: true, opacity: 0.90,
                depthWrite: false, sizeAttenuation: false,
            });
            const pts = new THREE.Points(geo, mat);
            pts.visible = false;
            return pts;
        }

        // Build one model per galaxy, oriented so disk faces the approaching camera
        const galaxyModels = [];
        galaxyData.forEach((g, i) => {
            const model = createGalaxyPoints(g.type, i * 1337 + 42);
            model.position.copy(galaxySprites[i].worldPos);

            // Disk normal (Y) pointing toward origin (where camera comes from)
            const viewDir = galaxySprites[i].worldPos.clone().normalize();
            const q = new THREE.Quaternion().setFromUnitVectors(
                new THREE.Vector3(0, 1, 0), viewDir.clone().negate()
            );
            model.setRotationFromQuaternion(q);

            // Sombrero is famous for being seen nearly edge-on
            if (g.name === 'Sombrero (M104)') model.rotateX(Math.PI * 0.44);

            // Keboola galaxy: keep K upright — no random tilt
            if (g.name !== 'Keboola') {
                const rng2 = mulberry32(i * 997 + 55);
                if (g.type === 'spiral') {
                    model.rotateX((rng2()-0.5) * 0.50);
                    model.rotateZ((rng2()-0.5) * 0.50);
                } else {
                    model.rotateX((rng2()-0.5) * 0.70);
                    model.rotateZ((rng2()-0.5) * 0.70);
                }
            }
            scene.add(model);
            galaxyModels.push(model);
        });

        // ── Camera fly state ──────────────────────────────────────────────────
        const flyState = {
            active: false,
            camTarget: new THREE.Vector3(),
            ctrlTarget: new THREE.Vector3(),
            onComplete: null,
            inGalaxyView: false,
            currentGalaxyIdx: -1,
            savedCamPos: new THREE.Vector3(0, 55, 110),
            savedCtrlTarget: new THREE.Vector3(0, 0, 0),
            solarScaleTarget: 1.0,
        };

        function flyTo(worldPos, galaxyIdx) {
            // Save solar system viewpoint only on first galaxy jump
            if (!flyState.inGalaxyView) {
                flyState._solarCamPos  = camera.position.clone();
                flyState._solarCtrlTarget = controls.target.clone();
            }
            // Always capture current position as animation start
            flyState.savedCamPos.copy(camera.position);
            flyState.savedCtrlTarget.copy(controls.target);
            // Hide previous galaxy when switching
            if (flyState.currentGalaxyIdx >= 0 && flyState.currentGalaxyIdx !== galaxyIdx) {
                galaxyModels[flyState.currentGalaxyIdx].visible = false;
            }
            document.getElementById('galaxy-info').style.display = 'none';

            const dir = worldPos.clone().normalize();
            flyState.camTarget.copy(dir).multiplyScalar(3300);
            flyState.ctrlTarget.copy(worldPos);
            flyState.active = true;
            flyState.startTime = performance.now();
            flyState.duration = 2800;
            flyState.currentGalaxyIdx = galaxyIdx;
            controls.enabled = false;
            controls.maxDistance = 5000;

            flyState.solarScaleTarget = 0.008;
            flyState.onComplete = () => {
                solarIndicator.visible = true;
                solarLabelEl.style.display = 'block';
                galaxyModels[galaxyIdx].visible = true;
                const g = galaxyData[galaxyIdx];
                const f = galaxyFacts[g.name];
                const el = document.getElementById('galaxy-info');
                el.innerHTML =
                    `<div class="ginfo-name">${g.name}</div>` +
                    `<div class="ginfo-row"><span>Type</span>${f.type}</div>` +
                    `<div class="ginfo-row"><span>Distance</span>${f.distance}</div>` +
                    `<div class="ginfo-row"><span>Diameter</span>${f.diameter}</div>` +
                    `<div class="ginfo-row"><span>Stars</span>${f.stars}</div>` +
                    `<div class="ginfo-fact">${f.fact}</div>`;
                el.style.display = 'block';
                document.getElementById('back-btn').style.display = 'block';
                flyState.inGalaxyView = true;
            };
        }

        function flyBack() {
            solarIndicator.visible = false;
            solarLabelEl.style.display = 'none';
            if (flyState.currentGalaxyIdx >= 0) {
                galaxyModels[flyState.currentGalaxyIdx].visible = false;
            }
            document.getElementById('galaxy-info').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
            flyState.inGalaxyView = false;
            flyState.currentGalaxyIdx = -1;
            // Capture current position as animation start
            flyState.savedCamPos.copy(camera.position);
            flyState.savedCtrlTarget.copy(controls.target);
            flyState.camTarget.copy(flyState._solarCamPos);
            flyState.ctrlTarget.copy(flyState._solarCtrlTarget);
            flyState.active = true;
            flyState.startTime = performance.now();
            flyState.duration = 2800;
            flyState.solarScaleTarget = 1.0;
            controls.enabled = false;
            flyState.onComplete = () => { controls.maxDistance = 400; controls.enabled = true; };
        }

        document.getElementById('back-btn').addEventListener('click', flyBack);
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (flyState.inGalaxyView) flyBack();
            }
        });

        // Galaxy legend — clickable items
        const galaxyLegendEl = document.getElementById('galaxy-legend');
        galaxySprites.forEach((g, i) => {
            const item = document.createElement('div');
            item.className = 'legend-item legend-galaxy';
            item.innerHTML = `<div class="legend-galaxy-icon"></div>${g.name}`;
            item.addEventListener('click', () => flyTo(g.worldPos, i));
            galaxyLegendEl.appendChild(item);
        });

        // Planet texture generators
        const textures = {
            mercury: canvasTex((ctx, s) => {
                ctx.fillStyle = '#8a8a8a'; ctx.fillRect(0, 0, s, s);
                for (let i = 0; i < 100; i++) {
                    ctx.fillStyle = `rgba(50,50,50,${Math.random()*0.5+0.2})`;
                    ctx.beginPath();
                    ctx.arc(Math.random()*s, Math.random()*s, Math.random()*10+1, 0, Math.PI*2);

                }
            }),
            venus: canvasTex((ctx, s) => {
                const g = ctx.createLinearGradient(0, 0, 0, s);
                g.addColorStop(0, '#e8c060'); g.addColorStop(0.5, '#daa030'); g.addColorStop(1, '#c07820');
                ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
                for (let i = 0; i < 15; i++) {

            }),
            mars: canvasTex((ctx, s) => {
                const g = ctx.createLinearGradient(0, 0, s, s);
                g.addColorStop(0, '#b84010'); g.addColorStop(0.5, '#d05828'); g.addColorStop(1, '#9a3000');
                ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
                for (let i = 0; i < 60; i++) {
                    ctx.fillStyle = `rgba(70,15,0,${Math.random()*0.4+0.1})`;

                ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);

                ctx.lineWidth = 3;

            saturnRing: canvasTex((ctx, s) => {

                for (let y = 0; y < s; y++) {

                    if (t > 0.04 && t < 0.22) a = (0.2 + Math.sin(t*120)*0.08) * 0.6;
                    if (t > 0.25 && t < 0.53) a = 0.75 + Math.sin(t*300)*0.1;
                    if (t > 0.53 && t < 0.57) a = 0.03;
                    if (t > 0.57 && t < 0.80) a = 0.45 + Math.sin(t*200)*0.08;
                    if (t > 0.71 && t < 0.735) a = 0.04;
                    if (t > 0.81 && t < 0.84) a = 0.18;
                    ctx.fillStyle = `rgba(200,168,110,${a})`;
                    ctx.fillRect(0, y, s, 1);
                }

        };

        // Real Earth/Moon textures from three.js CDN
        const BASE = 'https://raw.githubusercontent.com/mrdoob/three.js/r160/examples/textures/planets/';
        const earthMap     = textureLoader.load(BASE + 'earth_atmos_2048.jpg');
        const earthNormal  = textureLoader.load(BASE + 'earth_normal_2048.jpg');
        const earthSpecMap = textureLoader.load(BASE + 'earth_specular_2048.jpg');
        const earthClouds  = textureLoader.load(BASE + 'earth_clouds_2048.jpg');
        const moonMap      = textureLoader.load(BASE + 'moon_1024.jpg');

        // Real J2000 Keplerian elements. distance = visual semi-major axis (AU-compressed scale)
        // e = eccentricity, inc = inclination to ecliptic (°), period = sidereal years
        const BASE_SPEED = 0.01; // Earth rad/frame
        const planetsData = [
            { name: 'Mercury', tex: textures.mercury, size: 0.55, distance: 11,  e: 0.2056, inc: 7.00,  Omega:  48.331, omega:  29.125, period: 0.2408, tilt: 0.03,  roughness: 0.9, metalness: 0.1, orbitColor: 0x887766 },
            { name: 'Venus',   tex: textures.venus,   size: 1.05, distance: 17,  e: 0.0068, inc: 3.39,  Omega:  76.680, omega:  54.884, period: 0.6152, tilt: 3.10,  roughness: 0.6, metalness: 0,   orbitColor: 0xddaa55 },
            { name: 'Earth',   isEarth: true,          size: 1.15, distance: 24,  e: 0.0167, inc: 0.00,  Omega:   0.000, omega: 102.937, period: 1.0000, tilt: 0.41,                                  orbitColor: 0x4488ff },
            { name: 'Mars',    tex: textures.mars,    size: 0.75, distance: 34,  e: 0.0934, inc: 1.85,  Omega:  49.558, omega: 286.502, period: 1.8808, tilt: 0.44,  roughness: 0.9, metalness: 0,   orbitColor: 0xcc5533 },
            { name: 'Jupiter', tex: textures.jupiter, size: 3.4,  distance: 53,  e: 0.0489, inc: 1.30,  Omega: 100.464, omega:  14.331, period: 11.862, tilt: 0.05,  roughness: 0.7, metalness: 0,   orbitColor: 0xcc9944 },
            { name: 'Saturn',  tex: textures.saturn,  size: 2.9,  distance: 72,  e: 0.0565, inc: 2.49,  Omega: 113.665, omega:  93.058, period: 29.457, tilt: 0.47,  roughness: 0.7, metalness: 0,   hasRing: true, orbitColor: 0xddcc88 },
            { name: 'Uranus',  tex: textures.uranus,  size: 1.9,  distance: 88,  e: 0.0463, inc: 0.77,  Omega:  74.006, omega: 173.005, period: 84.011, tilt: 1.71,  roughness: 0.3, metalness: 0,   icy: true, orbitColor: 0x55ccdd },
            { name: 'Neptune', tex: textures.neptune, size: 1.8,  distance: 105, e: 0.0097, inc: 1.77,  Omega: 131.784, omega:  48.123, period: 164.79, tilt: 0.49,  roughness: 0.3, metalness: 0,   icy: true, orbitColor: 0x3366cc }
        ];

        const planets = [];

        // Draws a real Keplerian ellipse in ecliptic J2000 frame using full Euler rotation (Omega, inc, omega)
        // orbitalToScene is defined later (after PLANET_KEPLER), call deferred via arrow fn to avoid hoisting issue
        function orbitLine(a, e, incDeg, OmegaDeg, omegaDeg, color) {
            const b  = a * Math.sqrt(1 - e * e);
            const c  = a * e;
            const pts = [];
            for (let i = 0; i <= 256; i++) {
                const θ  = (i / 256) * Math.PI * 2;
                const px = a * Math.cos(θ) - c;
                const pz = b * Math.sin(θ);
                pts.push(orbitalToScene(px, pz, OmegaDeg, incDeg, omegaDeg, 1));
            }
            return new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.7 })
            );
        }

        function createPlanet(d) {
            const a      = d.distance;
            const b      = a * Math.sqrt(1 - d.e * d.e);
            const c      = a * d.e;
            const incRad = d.inc * Math.PI / 180;
            solarSystemGroup.add(orbitLine(a, d.e, d.inc, d.Omega || 0, d.omega || 0, d.orbitColor));

            let mat;
            if (d.isEarth) {
                mat = new THREE.MeshPhongMaterial({
                    map: earthMap, normalMap: earthNormal,
                    specularMap: earthSpecMap,
                    specular: new THREE.Color(0x444444), shininess: 30
                });
            } else if (d.icy) {
                mat = new THREE.MeshPhongMaterial({
                    map: d.tex,
                    specular: new THREE.Color(0x88ccff), shininess: 60
                });
            } else {
                mat = new THREE.MeshStandardMaterial({
                    map: d.tex,
                    roughness: d.roughness ?? 0.82,
                    metalness: d.metalness ?? 0
                });
            }

            const mesh = new THREE.Mesh(new THREE.SphereGeometry(d.size, 64, 64), mat);
            mesh.rotation.z = d.tilt || 0;

            if (d.isEarth) {
                const cloudMesh = new THREE.Mesh(
                    new THREE.SphereGeometry(d.size * 1.012, 64, 64),
                    new THREE.MeshPhongMaterial({ map: earthClouds, transparent: true, opacity: 0.38, depthWrite: false })
                );
                mesh.add(cloudMesh);
                mesh.userData.clouds = cloudMesh;

                // Atmosphere rim
                const atmMat = new THREE.MeshPhongMaterial({
                    color: 0x4488ff, transparent: true, opacity: 0.12,
                    side: THREE.BackSide
                });
                mesh.add(new THREE.Mesh(new THREE.SphereGeometry(d.size * 1.06, 64, 64), atmMat));

                // Moon
                const moon = new THREE.Mesh(
                    new THREE.SphereGeometry(0.27, 32, 32),
                    new THREE.MeshStandardMaterial({ map: moonMap, roughness: 0.95 })
                );
                solarSystemGroup.add(moon);
                mesh.userData.moon = moon;
                mesh.userData.moonAngle = Math.random() * Math.PI * 2;
            }

            if (d.hasRing) {
                const ringMat = new THREE.MeshBasicMaterial({
                    map: textures.saturnRing, side: THREE.DoubleSide,
                    transparent: true, depthWrite: false
                });
                const ring = new THREE.Mesh(new THREE.RingGeometry(d.size * 1.25, d.size * 2.5, 128), ringMat);
                ring.rotation.x = Math.PI / 2;
                mesh.add(ring);
            }

            solarSystemGroup.add(mesh);
            return {
                mesh, name: d.name, a, b, c, e: d.e, incRad,
                Omega: d.Omega || 0, omega: d.omega || 0, inc: d.inc || 0,
                speed: BASE_SPEED / d.period,
                angle: Math.random() * Math.PI * 2,
            };
        }

        planetsData.forEach(d => planets.push(createPlanet(d)));

        // ── Scale: real AU → visual scene units (matches compressed planet visual distances) ──
        // Planets use hand-picked visual distances (not linear AU) for a good default view.
        // Spacecraft trajectories must use the same non-linear scale so flybys align with planets.
        const AU_VIS_MAP = [
            [0,      0],
            [0.387, 11],   // Mercury visual orbit
            [0.723, 17],   // Venus
            [1.0,   24],   // Earth
            [1.524, 34],   // Mars
            [5.203, 53],   // Jupiter
            [9.537, 72],   // Saturn
            [19.19, 88],   // Uranus
            [30.07, 105],  // Neptune
        ];
        const _AU_VIS_SLOPE = (105 - 88) / (30.07 - 19.19); // ~1.56 units/AU beyond Neptune

        function auToVis(r) {
            if (r <= 0) return 0;
            for (let i = 1; i < AU_VIS_MAP.length; i++) {
                if (r <= AU_VIS_MAP[i][0]) {
                    const t = (r - AU_VIS_MAP[i-1][0]) / (AU_VIS_MAP[i][0] - AU_VIS_MAP[i-1][0]);
                    return AU_VIS_MAP[i-1][1] + t * (AU_VIS_MAP[i][1] - AU_VIS_MAP[i-1][1]);
                }
            }
            return 105 + (r - 30.07) * _AU_VIS_SLOPE;
        }

        // Convert Horizons ecliptic J2000 position (AU) → Three.js scene coords
        // Applies radial compression matching planet visual scale, then H→T axis mapping.
        function auPtToScene(hx, hy, hz) {
            const r = Math.sqrt(hx*hx + hy*hy + hz*hz);
            if (r < 1e-9) return new THREE.Vector3(0, 0, 0);
            const s = auToVis(r) / r;
            return new THREE.Vector3(hx * s, hz * s, hy * s); // H.x→T.x, H.y→T.z, H.z→T.y
        }

        // ── J2000 Keplerian elements (M0=mean anomaly at J2000, n=deg/day, Omega=ascending node, omega=argument of perihelion)
        // Source: JPL Planetary Fact Sheets / Horizons J2000 ecliptic frame
        const PLANET_KEPLER = [
            { M0: 174.7948, n: 360 / 87.9691,  Omega:  48.331, omega:  29.125 }, // Mercury
            { M0:  50.4161, n: 360 / 224.7008, Omega:  76.680, omega:  54.884 }, // Venus
            { M0: 357.5291, n: 360 / 365.2563, Omega:   0.000, omega: 102.937 }, // Earth
            { M0:  19.3730, n: 360 / 686.9710, Omega:  49.558, omega: 286.502 }, // Mars
            { M0: 282.5060, n: 360 / 4332.589, Omega: 100.464, omega:  14.331 }, // Jupiter
            { M0: 210.9740, n: 360 / 10759.22, Omega: 113.665, omega:  93.058 }, // Saturn
            { M0:  70.6450, n: 360 / 30688.5,  Omega:  74.006, omega: 173.005 }, // Uranus
            { M0: 123.0210, n: 360 / 60182.0,  Omega: 131.784, omega:  48.123 }, // Neptune
        ];

        // Iterative Kepler solver (converges in <10 steps for our eccentricities)
        function solveKepler(M, e) {
            let E = M;
            for (let i = 0; i < 10; i++) E -= (E - e * Math.sin(E) - M) / (1 - e * Math.cos(E));
            return E;
        }

        // Transform orbital-plane coords (px = along perihelion, pzF = perpendicular) to Three.js scene coords.
        // Applies full ecliptic J2000 rotation: argument of perihelion (omega), inclination (i), ascending node (Omega).
        // Three.js mapping: H.x→T.x, H.y→T.z, H.z→T.y  (ecliptic Z = north = Three.js Y)
        function orbitalToScene(px, pzF, OmegaDeg, incDeg, omegaDeg, scale) {
            const O  = OmegaDeg * Math.PI / 180;
            const i  = incDeg   * Math.PI / 180;
            const w  = omegaDeg * Math.PI / 180;
            const cO = Math.cos(O), sO = Math.sin(O);
            const ci = Math.cos(i), si = Math.sin(i);
            const cw = Math.cos(w), sw = Math.sin(w);
            const Hx = (cO * cw - sO * sw * ci) * px + (-cO * sw - sO * cw * ci) * pzF;
            const Hy = (sO * cw + cO * sw * ci) * px + (-sO * sw + cO * cw * ci) * pzF;
            const Hz = sw * si * px + cw * si * pzF;
            const s  = scale || 1;
            return new THREE.Vector3(Hx * s, Hz * s, Hy * s); // H.y→T.z, H.z→T.y
        }

            const photos = scName ? (SC_FLYBY_PHOTOS[scName] || []) : [];
            let found = null;
            for (const p of photos) {
                if (Math.abs(simDay - p.day) <= p.windowDays) { found = p; break; }
            }
            if (found) {
                if (flybyManuallyClosed) return; // user dismissed, don't reopen
                const imgPath = found.img;
                const isNew = !flybyVisible || flybyImg.getAttribute('data-src') !== imgPath;

                    flybyCaption.textContent = found.caption + ' ' + found.credit;
                    flybyPanel.style.display = 'block';
                    flybyVisible = true;
                    // Auto-pause for 5 seconds on first entry into the flyby window
                    if (playing) flybyPauseUntil = performance.now() + 5000;
                }
            } else {
                // reset manual-close flag when slider leaves the flyby window
                flybyManuallyClosed = false;
                if (flybyVisible) {
